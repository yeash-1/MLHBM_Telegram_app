 <!DOCTYPE html>
<html lang="en" class="dark selection:bg-red-600/30">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MLHBM Premium Cinema</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fff5f5',
                            100: '#ffe3e3',
                            500: '#ef4444',
                            600: '#dc2626',
                            700: '#b91c1c',
                            800: '#991b1b',
                            900: '#7f1d1d',
                            950: '#450a0a',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* Disable long-press context menu and tap highlights */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }
        /* Custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #09090b;
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #dc2626;
        }
        /* Ensure viewport size control on older browsers */
        html, body {
            overflow-x: hidden;
            background-color: #09090b;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen pb-24 font-sans select-none antialiased">

    <!-- Toast Notification Overlay -->
    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 transform scale-95 opacity-0 pointer-events-none transition-all duration-300">
        <div class="bg-zinc-900/90 backdrop-blur-md border border-zinc-800 text-zinc-100 px-4 py-2.5 rounded-full shadow-2xl flex items-center gap-2 text-sm">
            <span id="toast-icon" class="text-brand-500"><i class="fas fa-info-circle"></i></span>
            <span id="toast-message">Notification</span>
        </div>
    </div>

    <!-- Main Navigation Top Bar -->
    <header class="sticky top-0 z-40 bg-zinc-950/80 backdrop-blur-md border-b border-zinc-900/50 px-4 py-3.5 flex items-center justify-between safe-top">
        <div class="flex items-center gap-2.5">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-brand-700 to-brand-500 flex items-center justify-center shadow-lg shadow-brand-900/20">
                <span class="text-white font-extrabold text-sm tracking-tighter">M</span>
            </div>
            <div>
                <h1 class="font-extrabold text-base tracking-tight text-white leading-none">MLHBM</h1>
                <p class="text-[10px] text-zinc-500 font-medium tracking-wider uppercase">Premium Cinema</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="switchView('search')" class="text-zinc-400 hover:text-white transition-colors p-1" aria-label="Search">
                <i class="fa-solid fa-magnifying-glass text-lg"></i>
            </button>
            <div id="user-avatar-container" class="w-8 h-8 rounded-full border border-zinc-800 bg-zinc-900 overflow-hidden flex items-center justify-center">
                <span id="user-avatar-placeholder" class="text-xs font-semibold text-zinc-400">?</span>
                <img id="user-avatar" src="" alt="Avatar" class="w-full h-full object-cover hidden">
            </div>
        </div>
    </header>

    <!-- MAIN APP WRAPPER -->
    <main class="max-w-md mx-auto px-4 pt-4 pb-12">
        
        <!-- ================= HOME VIEW ================= -->
        <section id="view-home" class="space-y-6">
            <!-- Hero Banner Slider Container -->
            <div id="hero-carousel" class="relative rounded-2xl overflow-hidden aspect-[16/9] bg-zinc-900 border border-zinc-800/60 shadow-xl">
                <!-- Slide markup injected programmatically -->
                <div class="absolute inset-0 flex items-center justify-center text-zinc-500">
                    <i class="fa-solid fa-circle-notch animate-spin text-2xl"></i>
                </div>
            </div>

            <!-- Genre Quick Pill Filters -->
            <div class="space-y-3">
                <div class="flex items-center justify-between">
                    <h3 class="text-sm font-bold tracking-tight text-zinc-300 uppercase">Browse Categories</h3>
                    <button onclick="switchView('genres')" class="text-xs text-brand-500 font-semibold hover:underline">See All</button>
                </div>
                <div id="home-genre-pills" class="flex gap-2 overflow-x-auto pb-1 scrollbar-none -mx-4 px-4">
                    <!-- Dynamic Pills -->
                </div>
            </div>

            <!-- Dynamic Genre Shelves Container -->
            <div id="genre-shelves" class="space-y-6">
                <!-- Programmatic Movie Rows dynamic categories -->
            </div>
        </section>

        <!-- ================= SEARCH VIEW ================= -->
        <section id="view-search" class="space-y-6 hidden">
            <div class="space-y-3">
                <h2 class="text-xl font-extrabold text-white">Find Masterpieces</h2>
                <div class="relative">
                    <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="Search by title, actor, or genre..." class="w-full bg-zinc-900 border border-zinc-800 rounded-xl py-3 pl-11 pr-4 text-sm text-zinc-100 placeholder-zinc-500 focus:outline-none focus:border-brand-500/50 transition-colors">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>
                    <button onclick="clearSearch()" id="search-clear-btn" class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-white hidden">
                        <i class="fa-solid fa-circle-xmark"></i>
                    </button>
                </div>
            </div>

            <div id="search-results-info" class="text-sm text-zinc-500 hidden"></div>

            <div id="search-grid" class="grid grid-cols-2 gap-3.5">
                <!-- Cards appear here dynamically -->
            </div>
        </section>

        <!-- ================= GENRES VIEW ================= -->
        <section id="view-genres" class="space-y-6 hidden">
            <div class="space-y-2">
                <h2 class="text-xl font-extrabold text-white">Genres</h2>
                <p class="text-xs text-zinc-500">Filter premium cinematic catalogs by taxonomy.</p>
            </div>

            <!-- Dynamic Pill Selector -->
            <div id="genres-selector-container" class="flex flex-wrap gap-2">
                <!-- Genre Pills -->
            </div>

            <div id="genre-grid" class="grid grid-cols-2 gap-3.5">
                <!-- Movie lists filtered by category -->
            </div>
        </section>

        <!-- ================= MOVIE DETAILS VIEW ================= -->
        <section id="view-details" class="hidden -mx-4 -mt-4 pb-6">
            <div id="movie-detail-content">
                <!-- Dynamically built movie detail elements -->
            </div>
        </section>

        <!-- ================= PROFILE / WATCHLIST VIEW ================= -->
        <section id="view-profile" class="space-y-6 hidden">
            <!-- Glassy Premium Identity Card -->
            <div class="bg-zinc-900/60 backdrop-blur-md border border-zinc-800/50 rounded-2xl p-5 flex items-center gap-4">
                <div class="w-16 h-16 rounded-full border-2 border-brand-500 bg-zinc-900 overflow-hidden flex items-center justify-center shadow-lg shadow-brand-900/10">
                    <span id="profile-avatar-placeholder" class="text-xl font-bold text-zinc-300">?</span>
                    <img id="profile-avatar" src="" alt="Avatar" class="w-full h-full object-cover hidden">
                </div>
                <div>
                    <h3 id="profile-name" class="font-bold text-lg text-white">Anonymous Cinephile</h3>
                    <p id="profile-id" class="text-xs text-zinc-500 font-mono">Telegram ID: Undetected</p>
                    <span id="profile-rank" class="inline-block mt-2 bg-brand-950 border border-brand-900 text-brand-400 text-[10px] font-extrabold tracking-wider uppercase px-2 py-0.5 rounded-full">Elite Curator</span>
                </div>
            </div>

            <!-- Saved List (Synced with LocalStorage per User ID) -->
            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <h3 class="font-extrabold text-base text-white flex items-center gap-2">
                        <i class="fa-solid fa-bookmark text-brand-500"></i> My Personal Watchlist
                    </h3>
                    <span id="watchlist-count" class="text-xs bg-zinc-900 border border-zinc-800 px-2 py-0.5 rounded-full text-zinc-400 font-semibold">0 Title(s)</span>
                </div>

                <div id="watchlist-grid" class="grid grid-cols-2 gap-3.5">
                    <!-- Saved list cards -->
                </div>
            </div>
        </section>

    </main>

    <!-- PREMIUM GLASSY BOTTOM NAVIGATION BAR -->
    <nav class="fixed bottom-0 left-0 right-0 z-40 bg-zinc-950/80 backdrop-blur-lg border-t border-zinc-900/80 px-4 py-2 flex justify-around items-center max-w-md mx-auto pb-safe">
        <button onclick="switchView('home')" id="nav-btn-home" class="flex flex-col items-center gap-1 py-1 text-brand-500 transition-colors">
            <i class="fa-solid fa-compact-disc text-xl"></i>
            <span class="text-[10px] font-bold tracking-tight">Cinema</span>
        </button>
        <button onclick="switchView('search')" id="nav-btn-search" class="flex flex-col items-center gap-1 py-1 text-zinc-500 hover:text-zinc-300 transition-colors">
            <i class="fa-solid fa-magnifying-glass text-xl"></i>
            <span class="text-[10px] font-bold tracking-tight">Search</span>
        </button>
        <button onclick="switchView('genres')" id="nav-btn-genres" class="flex flex-col items-center gap-1 py-1 text-zinc-500 hover:text-zinc-300 transition-colors">
            <i class="fa-solid fa-tags text-xl"></i>
            <span class="text-[10px] font-bold tracking-tight">Genres</span>
        </button>
        <button onclick="switchView('profile')" id="nav-btn-profile" class="flex flex-col items-center gap-1 py-1 text-zinc-500 hover:text-zinc-300 transition-colors">
            <i class="fa-solid fa-circle-user text-xl"></i>
            <span class="text-[10px] font-bold tracking-tight">Watchlist</span>
        </button>
    </nav>

    <!-- CORE BUSINESS LOGIC SCRIPT -->
    <script>
        // Default Fallback Database Structure
        const DEFAULT_CATALOG = {
            settings: {
                appName: "MLHBM Premium Cinema",
                themeColor: "#09090b",
                telegramBotUsername: "MLHBMBot",
                contactSupport: ""
            },
            genres: ["Trending", "Action", "Drama", "Sci-Fi", "Thriller"],
            banners: [
                {
                    id: "b1",
                    title: "Dune: Part Two",
                    subtitle: "The Legendary Saga Continues",
                    image: "https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1080&auto=format&fit=crop",
                    movieId: "m1"
                },
                {
                    id: "b2",
                    title: "Interstellar Journey",
                    subtitle: "Experience Quantum Realism",
                    image: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1080&auto=format&fit=crop",
                    movieId: "m2"
                }
            ],
            movies: [
                {
                    id: "m1",
                    title: "Dune: Part Two",
                    genre: "Sci-Fi",
                    rating: "8.9",
                    releaseYear: "2024",
                    runtime: "166 min",
                    image: "https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=500&auto=format&fit=crop",
                    backdrop: "https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1080&auto=format&fit=crop",
                    cast: "Timothée Chalamet, Zendaya, Rebecca Ferguson",
                    synopsis: "Paul Atreides unites with Chani and the Fremen while seeking revenge against the conspirators who destroyed his family.",
                    downloadUrl: "https://example.com/download/dune2"
                },
                {
                    id: "m2",
                    title: "Interstellar",
                    genre: "Sci-Fi",
                    rating: "8.7",
                    releaseYear: "2014",
                    runtime: "169 min",
                    image: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=500&auto=format&fit=crop",
                    backdrop: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1080&auto=format&fit=crop",
                    cast: "Matthew McConaughey, Anne Hathaway, Jessica Chastain",
                    synopsis: "When Earth becomes uninhabitable, a team of explorers travels through a wormhole in space in an attempt to ensure humanity's survival.",
                    downloadUrl: "https://example.com/download/interstellar"
                },
                {
                    id: "m3",
                    title: "John Wick: Chapter 4",
                    genre: "Action",
                    rating: "8.2",
                    releaseYear: "2023",
                    runtime: "169 min",
                    image: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?q=80&w=500&auto=format&fit=crop",
                    backdrop: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?q=80&w=1080&auto=format&fit=crop",
                    cast: "Keanu Reeves, Donnie Yen, Bill Skarsgård",
                    synopsis: "John Wick uncovers a path to defeating The High Table. But before he can earn his freedom, Wick must face off against a new enemy.",
                    downloadUrl: "https://example.com/download/johnwick4"
                },
                {
                    id: "m4",
                    title: "The Dark Knight",
                    genre: "Action",
                    rating: "9.0",
                    releaseYear: "2008",
                    runtime: "152 min",
                    image: "https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=500&auto=format&fit=crop",
                    backdrop: "https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1080&auto=format&fit=crop",
                    cast: "Christian Bale, Heath Ledger, Aaron Eckhart",
                    synopsis: "When the menace known as the Joker wreaks havoc and chaos on the people of Gotham, Batman must accept one of the greatest psychological tests of his ability.",
                    downloadUrl: "https://example.com/download/darkknight"
                }
            ]
        };

        // Application State Management
        const state = {
            tg: null,
            user: {
                id: "unknown",
                username: "Anonymous",
                firstName: "Guest",
                photoUrl: null
            },
            catalog: DEFAULT_CATALOG,
            currentView: 'home',
            previousView: 'home',
            currentMovie: null,
            searchQuery: '',
            selectedGenre: 'All',
            watchlist: []
        };

        // Initialize Telegram WebApp Integration
        function initTelegram() {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                state.tg = tg;
                tg.ready();
                tg.expand();
                
                // Customize TG layout
                tg.setHeaderColor('#09090b');
                tg.setBackgroundColor('#09090b');
                
                // Map User Profile Details
                if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                    const rawUser = tg.initDataUnsafe.user;
                    state.user.id = rawUser.id || "unknown";
                    state.user.username = rawUser.username || "Cinephile";
                    state.user.firstName = rawUser.first_name || "Guest User";
                    if (rawUser.photo_url) {
                        state.user.photoUrl = rawUser.photo_url;
                    }
                }
                
                // Back Button Integration
                tg.BackButton.onClick(() => {
                    if (state.currentView === 'details') {
                        switchView(state.previousView);
                    } else {
                        switchView('home');
                    }
                });
            }
            updateProfileUI();
        }

        // Fetch movies.json and populate components dynamically
        async function fetchCatalog() {
            try {
                const response = await fetch('movies.json');
                if (!response.ok) {
                    throw new Error('Failed to load JSON');
                }
                const data = await response.json();
                state.catalog = {
                    settings: { ...DEFAULT_CATALOG.settings, ...(data.settings || {}) },
                    genres: data.genres || DEFAULT_CATALOG.genres,
                    banners: data.banners || DEFAULT_CATALOG.banners,
                    movies: data.movies || DEFAULT_CATALOG.movies
                };
            } catch (err) {
                console.warn("Using default catalog values; movies.json not loaded yet or parse failed.", err);
            } finally {
                loadWatchlist();
                renderAll();
            }
        }

        // Setup LocalStorage synchronizations per user
        function loadWatchlist() {
            const key = `mlhbm_watchlist_${state.user.id}`;
            const localData = localStorage.getItem(key);
            if (localData) {
                try {
                    state.watchlist = JSON.parse(localData);
                } catch (e) {
                    state.watchlist = [];
                }
            } else {
                state.watchlist = [];
            }
        }

        function saveWatchlist() {
            const key = `mlhbm_watchlist_${state.user.id}`;
            localStorage.setItem(key, JSON.stringify(state.watchlist));
            document.getElementById('watchlist-count').innerText = `${state.watchlist.length} Title(s)`;
            renderWatchlist();
        }

        function toggleWatchlist(movieId, event) {
            if (event) event.stopPropagation();
            const idx = state.watchlist.indexOf(movieId);
            if (idx > -1) {
                state.watchlist.splice(idx, 1);
                showToast("Removed from Watchlist", "fa-solid fa-bookmark");
            } else {
                state.watchlist.push(movieId);
                showToast("Added to Watchlist", "fa-solid fa-bookmark text-brand-500");
            }
            saveWatchlist();
            
            // Re-render UI segments containing variable icons
            if (state.currentView === 'details' && state.currentMovie && state.currentMovie.id === movieId) {
                renderMovieDetails(state.currentMovie);
            } else {
                renderAll();
            }
        }

        // Client Side Navigation router
        function switchView(viewName, data = null) {
            state.previousView = state.currentView;
            state.currentView = viewName;

            // Hide all structural sections
            ['view-home', 'view-search', 'view-genres', 'view-details', 'view-profile'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });

            // Show active views
            const targetId = `view-${viewName}`;
            const element = document.getElementById(targetId);
            if (element) {
                element.classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // Sync navigation highlight
            ['home', 'search', 'genres', 'profile'].forEach(navId => {
                const btn = document.getElementById(`nav-btn-${navId}`);
                if (btn) {
                    if (navId === viewName) {
                        btn.className = "flex flex-col items-center gap-1 py-1 text-brand-500 transition-colors";
                    } else {
                        btn.className = "flex flex-col items-center gap-1 py-1 text-zinc-500 hover:text-zinc-300 transition-colors";
                    }
                }
            });

            // Specific route setups
            if (viewName === 'details' && data) {
                state.currentMovie = data;
                renderMovieDetails(data);
                if (state.tg) state.tg.BackButton.show();
            } else {
                if (state.tg && viewName === 'home') {
                    state.tg.BackButton.hide();
                } else if (state.tg) {
                    state.tg.BackButton.show();
                }
            }

            if (viewName === 'profile') {
                renderWatchlist();
            }
        }

        // Utility: Show custom UI notification
        function showToast(message, iconClass = "fa-solid fa-info-circle") {
            const toast = document.getElementById('toast');
            document.getElementById('toast-icon').innerHTML = `<i class="${iconClass}"></i>`;
            document.getElementById('toast-message').innerText = message;
            
            toast.className = "fixed top-4 left-1/2 -translate-x-1/2 z-50 transform scale-100 opacity-100 transition-all duration-300";
            
            setTimeout(() => {
                toast.className = "fixed top-4 left-1/2 -translate-x-1/2 z-50 transform scale-95 opacity-0 pointer-events-none transition-all duration-300";
            }, 2500);
        }

        // Security Controls Implementation
        function runSecurityConstraints() {
            // Prevent inspect and hotkeys
            document.addEventListener('keydown', (e) => {
                if (
                    e.key === 'F12' || 
                    (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) || 
                    (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.key === 'S' || e.key === 's'))
                ) {
                    e.preventDefault();
                    return false;
                }
            });

            // Prevent text-selection
            document.addEventListener('selectstart', (e) => e.preventDefault());

            // Prevent Copy and Cut
            document.addEventListener('copy', (e) => e.preventDefault());
            document.addEventListener('cut', (e) => e.preventDefault());

            // Prevent Context Menu right clicks
            document.addEventListener('contextmenu', (e) => e.preventDefault());

            // Prevent touch zoom constraints (pinches)
            document.addEventListener('touchstart', (e) => {
                if (e.touches.length > 1) {
                    e.preventDefault();
                }
            }, { passive: false });
        }

        // Render Operations for Dynamic Elements
        function renderAll() {
            renderBanners();
            renderPills();
            renderGenreShelves();
            renderWatchlist();
            renderGenreSelectionTab();
        }

        function updateProfileUI() {
            // Header Mini Avatar
            const headPlaceholder = document.getElementById('user-avatar-placeholder');
            const headImg = document.getElementById('user-avatar');
            // Full Profile Page Elements
            const profPlaceholder = document.getElementById('profile-avatar-placeholder');
            const profImg = document.getElementById('profile-avatar');
            const nameEl = document.getElementById('profile-name');
            const idEl = document.getElementById('profile-id');

            nameEl.innerText = state.user.firstName + (state.user.username ? ` (@${state.user.username})` : '');
            idEl.innerText = `Telegram ID: ${state.user.id}`;

            const initials = state.user.firstName.charAt(0).toUpperCase();
            headPlaceholder.innerText = initials;
            profPlaceholder.innerText = initials;

            if (state.user.photoUrl) {
                headImg.src = state.user.photoUrl;
                headImg.classList.remove('hidden');
                headPlaceholder.classList.add('hidden');

                profImg.src = state.user.photoUrl;
                profImg.classList.remove('hidden');
                profPlaceholder.classList.add('hidden');
            }
        }

        function renderBanners() {
            const container = document.getElementById('hero-carousel');
            if (!state.catalog.banners || state.catalog.banners.length === 0) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');

            let index = 0;
            const updateSlide = () => {
                const banner = state.catalog.banners[index];
                const targetMovie = state.catalog.movies.find(m => m.id === banner.movieId);
                
                container.innerHTML = `
                    <div class="absolute inset-0 bg-cover bg-center transition-all duration-1000 ease-in-out scale-105" style="background-image: url('${banner.image}')"></div>
                    <div class="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/40 to-transparent"></div>
                    <div class="absolute bottom-4 left-4 right-4">
                        <span class="inline-block bg-brand-600 text-[10px] font-extrabold px-2.5 py-0.5 rounded-full uppercase tracking-wider mb-1.5 shadow-lg shadow-brand-900/30">Spotlight</span>
                        <h2 class="text-xl font-extrabold tracking-tight text-white line-clamp-1">${banner.title}</h2>
                        <p class="text-xs text-zinc-300 font-medium line-clamp-1 mb-2">${banner.subtitle}</p>
                        ${targetMovie ? `
                        <button onclick="viewMovieDetails('${targetMovie.id}')" class="bg-zinc-100 hover:bg-white text-zinc-950 text-xs font-bold py-1.5 px-3.5 rounded-lg inline-flex items-center gap-1.5 shadow-md active:scale-95 transition-transform">
                            <i class="fa-solid fa-circle-info"></i> View Details
                        </button>` : ''}
                    </div>
                `;
            };

            updateSlide();
            // Rotate banners automatically
            if (state.catalog.banners.length > 1) {
                clearInterval(window.bannerInterval);
                window.bannerInterval = setInterval(() => {
                    index = (index + 1) % state.catalog.banners.length;
                    updateSlide();
                }, 8000);
            }
        }

        function renderPills() {
            const container = document.getElementById('home-genre-pills');
            let markup = `<button onclick="setGenreFilter('All')" class="px-4 py-2 rounded-xl text-xs font-semibold whitespace-nowrap transition-all duration-200 ${state.selectedGenre === 'All' ? 'bg-brand-600 text-white' : 'bg-zinc-900 text-zinc-400 hover:text-white border border-zinc-800/60'}">All Cinema</button>`;
            
            state.catalog.genres.forEach(genre => {
                const isActive = state.selectedGenre === genre;
                markup += `
                    <button onclick="setGenreFilter('${genre}')" class="px-4 py-2 rounded-xl text-xs font-semibold whitespace-nowrap transition-all duration-200 ${isActive ? 'bg-brand-600 text-white shadow-lg shadow-brand-900/10' : 'bg-zinc-900 text-zinc-400 hover:text-white border border-zinc-800/60'}">
                        ${genre}
                    </button>
                `;
            });
            container.innerHTML = markup;
        }

        function setGenreFilter(genre) {
            state.selectedGenre = genre;
            renderPills();
            switchView('genres');
            renderGenreSelectionTab();
        }

        function renderGenreShelves() {
            const container = document.getElementById('genre-shelves');
            container.innerHTML = '';

            const genresToRender = state.catalog.genres;
            genresToRender.forEach(genre => {
                const moviesInGenre = state.catalog.movies.filter(m => m.genre.toLowerCase() === genre.toLowerCase());
                if (moviesInGenre.length === 0) return;

                const shelf = document.createElement('div');
                shelf.className = "space-y-3";
                shelf.innerHTML = `
                    <div class="flex items-center justify-between">
                        <h3 class="font-bold text-base text-zinc-100 flex items-center gap-1.5">
                            <span class="w-1.5 h-4 bg-brand-600 rounded-full"></span>
                            ${genre}
                        </h3>
                        <span class="text-xs text-zinc-500 font-medium">${moviesInGenre.length} Titles</span>
                    </div>
                    <div class="flex gap-4 overflow-x-auto pb-2 scrollbar-thin -mx-4 px-4">
                        ${moviesInGenre.map(movie => {
                            const isSaved = state.watchlist.includes(movie.id);
                            return `
                            <div onclick="viewMovieDetails('${movie.id}')" class="flex-shrink-0 w-32 space-y-1.5 group cursor-pointer">
                                <div class="relative aspect-[2/3] bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800/60 shadow-lg transition-transform active:scale-95 duration-200">
                                    <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover">
                                    <div class="absolute top-2 right-2 flex flex-col gap-1.5">
                                        <button onclick="toggleWatchlist('${movie.id}', event)" class="w-7 h-7 rounded-full bg-zinc-950/75 backdrop-blur-md border border-zinc-800/50 flex items-center justify-center text-xs shadow-md transition-colors active:scale-90">
                                            <i class="${isSaved ? 'fa-solid fa-bookmark text-brand-500' : 'fa-regular fa-bookmark text-zinc-300'}"></i>
                                        </button>
                                    </div>
                                    <div class="absolute bottom-2 left-2 bg-black/60 backdrop-blur-md px-1.5 py-0.5 rounded border border-zinc-800/50 flex items-center gap-1 text-[9px] font-extrabold text-brand-400">
                                        <i class="fa-solid fa-star"></i> ${movie.rating}
                                    </div>
                                </div>
                                <h4 class="font-semibold text-xs text-zinc-200 line-clamp-1 group-hover:text-white">${movie.title}</h4>
                                <p class="text-[10px] text-zinc-500 font-medium">${movie.releaseYear}</p>
                            </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(shelf);
            });
        }

        function renderGenreSelectionTab() {
            const container = document.getElementById('genres-selector-container');
            const grid = document.getElementById('genre-grid');

            // Build dynamic pill selector list
            let selectorMarkup = `<button onclick="updateGenreTab('All')" class="px-3.5 py-1.5 rounded-xl text-xs font-semibold whitespace-nowrap transition-colors border ${state.selectedGenre === 'All' ? 'bg-brand-600 border-brand-500 text-white' : 'bg-zinc-900 border-zinc-800/80 text-zinc-400'}">All</button>`;
            state.catalog.genres.forEach(genre => {
                const isActive = state.selectedGenre === genre;
                selectorMarkup += `
                    <button onclick="updateGenreTab('${genre}')" class="px-3.5 py-1.5 rounded-xl text-xs font-semibold whitespace-nowrap transition-colors border ${isActive ? 'bg-brand-600 border-brand-500 text-white' : 'bg-zinc-900 border-zinc-800/80 text-zinc-400'}">
                        ${genre}
                    </button>
                `;
            });
            container.innerHTML = selectorMarkup;

            // Filter movies
            const filteredMovies = state.selectedGenre === 'All' 
                ? state.catalog.movies 
                : state.catalog.movies.filter(m => m.genre.toLowerCase() === state.selectedGenre.toLowerCase());

            if (filteredMovies.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-2 text-center py-12 space-y-2">
                        <i class="fa-solid fa-clapperboard text-4xl text-zinc-700"></i>
                        <p class="text-sm text-zinc-500">No movies found in this genre.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredMovies.map(movie => {
                const isSaved = state.watchlist.includes(movie.id);
                return `
                <div onclick="viewMovieDetails('${movie.id}')" class="bg-zinc-900/40 border border-zinc-900 hover:border-zinc-800/60 rounded-xl p-2.5 flex flex-col justify-between space-y-2 cursor-pointer shadow-sm">
                    <div class="relative aspect-[2/3] bg-zinc-950 rounded-lg overflow-hidden border border-zinc-800/50">
                        <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover">
                        <button onclick="toggleWatchlist('${movie.id}', event)" class="absolute top-2 right-2 w-7 h-7 rounded-full bg-zinc-950/75 backdrop-blur-md border border-zinc-800/50 flex items-center justify-center text-xs shadow-md">
                            <i class="${isSaved ? 'fa-solid fa-bookmark text-brand-500' : 'fa-regular fa-bookmark text-zinc-300'}"></i>
                        </button>
                    </div>
                    <div class="space-y-0.5">
                        <div class="flex items-center justify-between text-[10px] text-zinc-500 font-medium">
                            <span>${movie.releaseYear} • ${movie.genre}</span>
                            <span class="text-brand-400 font-bold"><i class="fa-solid fa-star"></i> ${movie.rating}</span>
                        </div>
                        <h4 class="font-bold text-xs text-zinc-200 line-clamp-1">${movie.title}</h4>
                    </div>
                </div>
                `;
            }).join('');
        }

        function updateGenreTab(genre) {
            state.selectedGenre = genre;
            renderGenreSelectionTab();
        }

        // Search logic implementation
        function handleSearch(val) {
            state.searchQuery = val.trim().toLowerCase();
            const clearBtn = document.getElementById('search-clear-btn');
            const infoText = document.getElementById('search-results-info');
            const grid = document.getElementById('search-grid');

            if (state.searchQuery.length > 0) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
                infoText.classList.add('hidden');
                grid.innerHTML = '';
                return;
            }

            const results = state.catalog.movies.filter(movie => {
                return (
                    movie.title.toLowerCase().includes(state.searchQuery) ||
                    movie.genre.toLowerCase().includes(state.searchQuery) ||
                    (movie.cast && movie.cast.toLowerCase().includes(state.searchQuery))
                );
            });

            infoText.classList.remove('hidden');
            infoText.innerText = `Found ${results.length} results matching "${val}"`;

            if (results.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-2 text-center py-12 space-y-2">
                        <i class="fa-solid fa-circle-question text-4xl text-zinc-700"></i>
                        <p class="text-sm text-zinc-500">No matching titles discovered.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = results.map(movie => {
                const isSaved = state.watchlist.includes(movie.id);
                return `
                <div onclick="viewMovieDetails('${movie.id}')" class="bg-zinc-900/40 border border-zinc-900 rounded-xl p-2.5 flex flex-col justify-between space-y-2 cursor-pointer">
                    <div class="relative aspect-[2/3] bg-zinc-950 rounded-lg overflow-hidden border border-zinc-800/50">
                        <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover">
                        <button onclick="toggleWatchlist('${movie.id}', event)" class="absolute top-2 right-2 w-7 h-7 rounded-full bg-zinc-950/75 backdrop-blur-md border border-zinc-800/50 flex items-center justify-center text-xs shadow-md">
                            <i class="${isSaved ? 'fa-solid fa-bookmark text-brand-500' : 'fa-regular fa-bookmark text-zinc-300'}"></i>
                        </button>
                    </div>
                    <div class="space-y-0.5">
                        <div class="flex items-center justify-between text-[10px] text-zinc-500 font-medium">
                            <span>${movie.releaseYear} • ${movie.genre}</span>
                            <span class="text-brand-400 font-bold"><i class="fa-solid fa-star"></i> ${movie.rating}</span>
                        </div>
                        <h4 class="font-bold text-xs text-zinc-200 line-clamp-1">${movie.title}</h4>
                    </div>
                </div>
                `;
            }).join('');
        }

        function clearSearch() {
            const input = document.getElementById('search-input');
            input.value = '';
            handleSearch('');
            input.focus();
        }

        function viewMovieDetails(movieId) {
            const movie = state.catalog.movies.find(m => m.id === movieId);
            if (movie) {
                switchView('details', movie);
            }
        }

        function renderMovieDetails(movie) {
            const container = document.getElementById('movie-detail-content');
            const isSaved = state.watchlist.includes(movie.id);

            container.innerHTML = `
                <!-- Backdrop Banner Hero -->
                <div class="relative aspect-[16/9] w-full bg-zinc-900">
                    <img src="${movie.backdrop || movie.image}" alt="${movie.title}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/30 to-transparent"></div>
                    <button onclick="switchView('${state.previousView}')" class="absolute top-4 left-4 w-9 h-9 rounded-full bg-zinc-950/75 backdrop-blur-md border border-zinc-800/50 flex items-center justify-center text-zinc-100 shadow-xl">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <button onclick="toggleWatchlist('${movie.id}', event)" class="absolute top-4 right-4 w-9 h-9 rounded-full bg-zinc-950/75 backdrop-blur-md border border-zinc-800/50 flex items-center justify-center text-zinc-100 shadow-xl">
                        <i class="${isSaved ? 'fa-solid fa-bookmark text-brand-500' : 'fa-regular fa-bookmark'}"></i>
                    </button>
                </div>

                <!-- Detail Content Metadata container -->
                <div class="px-4 -mt-6 relative z-10 space-y-5">
                    <div class="flex gap-4 items-end">
                        <div class="w-24 aspect-[2/3] rounded-xl overflow-hidden border border-zinc-800 bg-zinc-900 shadow-2xl flex-shrink-0">
                            <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover">
                        </div>
                        <div class="space-y-1.5 pb-1">
                            <h2 class="text-xl font-extrabold text-white leading-tight">${movie.title}</h2>
                            <div class="flex flex-wrap items-center gap-1.5 text-xs text-zinc-400">
                                <span class="bg-zinc-900/80 px-2 py-0.5 rounded border border-zinc-800/50 text-[10px] font-extrabold text-brand-400 uppercase tracking-wide">${movie.genre}</span>
                                <span>•</span>
                                <span>${movie.releaseYear}</span>
                                <span>•</span>
                                <span>${movie.runtime}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Scores & Highlights -->
                    <div class="grid grid-cols-3 gap-3">
                        <div class="bg-zinc-900/60 border border-zinc-800/50 backdrop-blur-md rounded-xl p-2.5 text-center">
                            <span class="block text-[9px] font-bold text-zinc-500 uppercase tracking-wider mb-0.5">Rating</span>
                            <span class="text-sm font-extrabold text-brand-400"><i class="fa-solid fa-star"></i> ${movie.rating}/10</span>
                        </div>
                        <div class="col-span-2 bg-zinc-900/60 border border-zinc-800/50 backdrop-blur-md rounded-xl p-2.5 flex items-center justify-center gap-2">
                            <span class="text-xs font-semibold text-zinc-300">Status: <span class="text-green-500">Ready</span></span>
                        </div>
                    </div>

                    <!-- CTA Actions Area: Strict Dynamic Button Specifications -->
                    <div class="flex gap-3">
                        <button onclick="triggerSecureDownload('${movie.downloadUrl}')" class="flex-1 bg-gradient-to-r from-brand-700 to-brand-600 hover:from-brand-600 hover:to-brand-500 text-white font-extrabold text-sm py-3 px-6 rounded-xl flex items-center justify-center gap-2.5 shadow-xl shadow-brand-950/40 active:scale-[0.98] transition-transform">
                            <i class="fa-solid fa-circle-down text-lg"></i> Download Now
                        </button>
                        <button onclick="triggerSecureShare('${movie.id}')" class="bg-zinc-900 hover:bg-zinc-800 text-zinc-200 border border-zinc-800 font-bold text-sm py-3 px-4.5 rounded-xl flex items-center justify-center gap-2.5 active:scale-[0.98] transition-transform" aria-label="Share">
                            <i class="fa-solid fa-share-nodes text-lg"></i> Share
                        </button>
                    </div>

                    <!-- Synopsis -->
                    <div class="space-y-2">
                        <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-wider">Synopsis</h3>
                        <p class="text-sm text-zinc-300 leading-relaxed font-light">${movie.synopsis}</p>
                    </div>

                    <!-- Cast & Crew -->
                    ${movie.cast ? `
                    <div class="space-y-2 border-t border-zinc-900/60 pt-4">
                        <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-wider">Starring Cast</h3>
                        <p class="text-xs text-zinc-400 leading-relaxed font-medium"><i class="fa-solid fa-user-friends text-brand-500 mr-1.5"></i> ${movie.cast}</p>
                    </div>
                    ` : ''}

                </div>
            `;
        }

        // Action Executions
        function triggerSecureDownload(url) {
            if (!url || url.startsWith("https://example.com")) {
                showToast("Download setup dynamically.", "fa-solid fa-circle-info");
                return;
            }
            if (state.tg) {
                state.tg.openLink(url);
            } else {
                window.open(url, '_blank');
            }
        }

        function triggerSecureShare(movieId) {
            const movie = state.catalog.movies.find(m => m.id === movieId);
            if (!movie) return;

            const botUsername = state.catalog.settings.telegramBotUsername || "MLHBMBot";
            // Custom deep link path inside Telegram bot parameters
            const referralLink = `https://t.me/${botUsername}?startapp=movie_${movie.id}`;
            const messageText = `Check out "${movie.title}" (${movie.releaseYear}) on MLHBM Cinema! Download link is ready inside.`;
            
            // Standard official deep linking pattern
            const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(referralLink)}&text=${encodeURIComponent(messageText)}`;
            
            // Execute copy to clipboard instantly
            navigator.clipboard.writeText(referralLink).then(() => {
                showToast("Telegram Share Link Copied!", "fa-solid fa-circle-check text-green-500");
                // Open share prompt directly inside TG environment if active
                setTimeout(() => {
                    if (state.tg) {
                        state.tg.openTelegramLink(shareUrl);
                    } else {
                        window.open(shareUrl, '_blank');
                    }
                }, 800);
            }).catch(() => {
                // Secondary backup opening method if access profile restrictions apply
                if (state.tg) {
                    state.tg.openTelegramLink(shareUrl);
                } else {
                    window.open(shareUrl, '_blank');
                }
            });
        }

        function renderWatchlist() {
            const container = document.getElementById('watchlist-grid');
            if (state.watchlist.length === 0) {
                container.innerHTML = `
                    <div class="col-span-2 text-center py-12 space-y-2">
                        <i class="fa-regular fa-folder-open text-4xl text-zinc-700"></i>
                        <p class="text-sm text-zinc-500">Your Watchlist is empty.</p>
                        <button onclick="switchView('home')" class="mt-2 text-xs bg-zinc-900 border border-zinc-800 px-3.5 py-1.5 rounded-lg font-bold text-zinc-300">Discover Movies</button>
                    </div>
                `;
                return;
            }

            const savedMovies = state.catalog.movies.filter(m => state.watchlist.includes(m.id));
            container.innerHTML = savedMovies.map(movie => {
                return `
                <div onclick="viewMovieDetails('${movie.id}')" class="bg-zinc-900/40 border border-zinc-900 rounded-xl p-2.5 flex flex-col justify-between space-y-2 cursor-pointer">
                    <div class="relative aspect-[2/3] bg-zinc-950 rounded-lg overflow-hidden border border-zinc-800/50">
                        <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover">
                        <button onclick="toggleWatchlist('${movie.id}', event)" class="absolute top-2 right-2 w-7 h-7 rounded-full bg-zinc-950/75 backdrop-blur-md border border-zinc-800/50 flex items-center justify-center text-xs shadow-md">
                            <i class="fa-solid fa-bookmark text-brand-500"></i>
                        </button>
                    </div>
                    <div class="space-y-0.5">
                        <div class="flex items-center justify-between text-[10px] text-zinc-500 font-medium">
                            <span>${movie.releaseYear} • ${movie.genre}</span>
                            <span class="text-brand-400 font-bold"><i class="fa-solid fa-star"></i> ${movie.rating}</span>
                        </div>
                        <h4 class="font-bold text-xs text-zinc-200 line-clamp-1">${movie.title}</h4>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Deep Linking verification checks on execution init
        function processDeepLinking() {
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe) {
                const startParam = window.Telegram.WebApp.initDataUnsafe.start_param;
                if (startParam && startParam.startsWith('movie_')) {
                    const extractedMovieId = startParam.replace('movie_', '');
                    const matchingMovie = state.catalog.movies.find(m => m.id === extractedMovieId);
                    if (matchingMovie) {
                        switchView('details', matchingMovie);
                    }
                }
            }
        }

        // Run client routines
        window.addEventListener('DOMContentLoaded', async () => {
            initTelegram();
            runSecurityConstraints();
            await fetchCatalog();
            processDeepLinking();
        });
    </script>
</body>
</html>
