 <!DOCTYPE html>
<html lang="en" class="dark h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MLHBM - Premium Mini App</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#E50914',
                            hover: '#C20710',
                            glass: 'rgba(229, 9, 20, 0.15)',
                            border: 'rgba(229, 9, 20, 0.3)'
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Strict Custom Security & Smooth UX Styles */
        body {
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom Scrollbar Styles for premium layout */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(63, 63, 70, 0.4);
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(229, 9, 20, 0.5);
        }
        /* Premium custom glowing background effects */
        .glass-panel {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(63, 63, 70, 0.4);
        }
        .glass-card {
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(63, 63, 70, 0.3);
        }
        .text-glow {
            text-shadow: 0 0 15px rgba(229, 9, 20, 0.4);
        }
        .glow-overlay {
            background: radial-gradient(circle at top, rgba(229, 9, 20, 0.15) 0%, transparent 70%);
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans h-full relative flex flex-col overflow-hidden">

    <!-- Glowing backdrop accent -->
    <div class="absolute inset-0 glow-overlay pointer-events-none z-0"></div>

    <!-- MAIN APP CONTAINER -->
    <div class="h-full flex flex-col overflow-hidden relative z-10 w-full max-w-md mx-auto">

        <!-- GLOBAL HEADER -->
        <header class="flex items-center justify-between px-4 py-3 border-b border-zinc-900/80 bg-zinc-950/80 backdrop-blur-md sticky top-0 z-40">
            <div class="flex items-center space-x-2">
                <span class="w-2.5 h-2.5 rounded-full bg-brand animate-pulse"></span>
                <h1 class="text-xl font-extrabold tracking-wider text-white">MLH<span class="text-brand">BM</span></h1>
            </div>
            <!-- Profile Trigger Button -->
            <button id="profile-trigger" class="w-9 h-9 rounded-full bg-zinc-900/90 border border-zinc-800/80 flex items-center justify-center hover:border-brand/40 transition-all duration-300 shadow-inner">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
            </button>
        </header>

        <!-- VIEWS CONTENT AREA (Scroll-locked and Touch-pan enabled) -->
        <main class="flex-1 overflow-y-auto relative pb-28 touch-pan-y" style="-webkit-overflow-scrolling: touch;">

            <!-- VIEW 1: HOME -->
            <section id="home-view" class="view-panel space-y-6">
                
                <!-- Hero Manual Slider (Swipe Gestures Support) -->
                <div class="relative w-full h-[280px] bg-zinc-900 overflow-hidden" id="hero-slider-container">
                    <div id="hero-track" class="flex w-full h-full transition-transform duration-500 ease-out">
                        <!-- Dynamic Banners Rendered Here -->
                    </div>
                    <!-- Linear bottom fading overlay -->
                    <div class="absolute inset-x-0 bottom-0 h-40 bg-gradient-to-t from-zinc-950 via-zinc-950/70 to-transparent pointer-events-none"></div>
                    
                    <!-- Dynamic Information Overlay -->
                    <div class="absolute inset-x-0 bottom-0 p-4 flex flex-col justify-end pointer-events-none">
                        <div id="hero-info" class="space-y-1.5 transition-opacity duration-300 select-none">
                            <div class="flex items-center space-x-2">
                                <span id="hero-badge" class="px-2 py-0.5 text-[10px] font-bold tracking-wider uppercase bg-brand/90 text-white rounded"></span>
                                <span id="hero-year" class="text-xs font-semibold text-zinc-300"></span>
                            </div>
                            <h2 id="hero-title" class="text-xl font-extrabold text-white tracking-tight drop-shadow-md"></h2>
                            <p id="hero-desc" class="text-xs text-zinc-400 line-clamp-2 max-w-[85%]"></p>
                        </div>
                        <!-- Action row: height-aligned Info & Bookmark -->
                        <div class="flex items-center space-x-2 mt-3 pointer-events-auto">
                            <button id="hero-info-btn" class="h-8 px-4 flex items-center justify-center space-x-1.5 rounded bg-white/10 hover:bg-white/20 border border-white/20 backdrop-blur-md transition-all duration-300 text-xs text-white font-medium">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                                <span>Info</span>
                            </button>
                            <button id="hero-fav-btn" class="w-8 h-8 flex items-center justify-center rounded bg-zinc-900/80 hover:bg-zinc-800 border border-zinc-700/50 backdrop-blur-md transition-all duration-300">
                                <svg id="hero-fav-icon" class="w-4 h-4 text-zinc-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Slider dots -->
                    <div class="absolute right-4 bottom-4 flex space-x-1.5 z-20 pointer-events-auto" id="slider-dots">
                        <!-- Dynamic Dots -->
                    </div>
                </div>

                <!-- Dynamic Row Containers -->
                <div id="dynamic-rows" class="space-y-6 px-4">
                    <!-- Loaded dynamically via JS, ignoring category "None" -->
                </div>
            </section>

            <!-- VIEW 2: SEARCH -->
            <section id="search-view" class="view-panel hidden px-4 pt-4 space-y-4">
                <div class="relative">
                    <input type="text" id="search-input" placeholder="Search movies, tv shows..." class="w-full h-11 bg-zinc-900/90 border border-zinc-800/80 rounded-lg pl-10 pr-4 text-sm text-white focus:outline-none focus:border-brand/60 transition-colors placeholder-zinc-500">
                    <span class="absolute left-3 top-3.5 text-zinc-500">
                        <svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </span>
                </div>

                <div id="search-results" class="grid grid-cols-3 gap-2">
                    <!-- Filled dynamically -->
                </div>
                <div id="search-empty" class="hidden flex flex-col items-center justify-center py-20 text-zinc-500 space-y-2">
                    <svg class="w-12 h-12 stroke-current opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>

            </section>

            <!-- VIEW 3: BROWSE (COLLAGE GRID) -->
            <section id="browse-view" class="view-panel hidden px-4 pt-4 space-y-4">

                <div class="flex p-0.5 bg-zinc-900/90 border border-zinc-800/80 rounded-lg">
                    <button id="toggle-movies" class="flex-1 py-1.5 text-xs font-bold rounded-md transition-all duration-300 bg-brand/20 border border-brand/40 text-brand backdrop-blur-sm">Movies</button>
                    <button id="toggle-shows" class="flex-1 py-1.5 text-xs font-bold rounded-md transition-all duration-300 text-zinc-400 hover:text-white">TV Shows</button>
                </div>

                <div id="browse-genres-grid" class="grid grid-cols-2 gap-3">
                    <!-- Rendered Dynamically -->
                </div>
            </section>

            <!-- VIEW 4: WATCHLIST -->
            <section id="watchlist-view" class="view-panel hidden px-4 pt-4 space-y-4">

                    <span id="watchlist-total" class="px-2 py-0.5 text-xs font-semibold bg-zinc-900 border border-zinc-800 text-zinc-300 rounded-full">0</span>
                </div>

                <div id="watchlist-grid" class="grid grid-cols-3 gap-2">
                    <!-- Dynamic Items -->
                </div>

                <div id="watchlist-empty" class="hidden flex flex-col items-center justify-center py-24 text-zinc-500 space-y-2">
                    <svg class="w-12 h-12 stroke-current opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path>

                </div>
            </section>

        </main>

            <button id="tab-home" class="nav-tab flex flex-col items-center justify-center space-y-1 text-brand">

                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path>
                </svg>

            </button>
            <button id="tab-search" class="nav-tab flex flex-col items-center justify-center space-y-1 text-zinc-500 hover:text-zinc-300">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>

                </svg>
                <span class="text-[10px] font-semibold tracking-wider">Browse</span>
            </button>
            <button id="tab-watchlist" class="nav-tab flex flex-col items-center justify-center space-y-1 text-zinc-500 hover:text-zinc-300">
                <svg class="w-5 h-5 transition-transform active:scale-95" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path>
                </svg>
                <span class="text-[10px] font-semibold tracking-wider">Watchlist</span>

                </div>
            </div>

            <button id="profile-close-btn" class="w-full py-3 rounded-lg bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 hover:border-zinc-700/80 text-xs font-bold tracking-wider transition-all duration-300">CLOSE DASHBOARD</button>

                <div class="absolute inset-x-0 bottom-4 flex justify-center z-10">
                    <img id="details-poster" class="w-[100px] h-[145px] object-cover rounded-lg shadow-2xl border border-zinc-800/80 scale-100 transition-transform duration-300" src="" alt="">
                </div>
            </div>

            <!-- MIDDLE DETAILS PANEL -->

                <div class="text-center space-y-2">
                    <h2 id="details-title" class="text-xl font-bold text-white leading-snug tracking-tight"></h2>
                    
                    <div class="flex flex-wrap items-center justify-center gap-2 text-xs text-zinc-400">
                        <span id="details-year" class="font-semibold"></span>
                        <span class="w-1 h-1 rounded-full bg-zinc-700"></span>
                        <span id="details-rating" class="px-1.5 py-0.5 rounded bg-brand/10 border border-brand/30 text-brand text-[10px] font-bold"></span>
                        <span class="w-1 h-1 rounded-full bg-zinc-700"></span>
                        <span id="details-runtime" class="font-semibold"></span>
                        <span id="details-status" class="hidden px-2 py-0.5 rounded bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[9px] font-semibold uppercase tracking-wider"></span>
                    </div>

                    <div id="details-genres" class="flex flex-wrap items-center justify-center gap-1.5 pt-1">
                        <!-- Filled via JavaScript -->
                    </div>
                </div>

                <div id="conditional-content" class="space-y-4">
                    <!-- Dynamic tabs/lists injected here -->
                </div>

                <div class="space-y-1.5">
                    <h3 class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Overview</h3>
                    <p id="details-overview" class="text-xs text-zinc-300 leading-relaxed"></p>
                </div>

            </div>

            <!-- BOTTOM CONTROLS & WATCHLIST TOGGLE -->
            <div class="p-4 bg-zinc-900/90 border-t border-zinc-800/40 backdrop-blur-md flex items-center space-x-3 flex-shrink-0">
                <button id="details-back-btn" class="flex-1 py-3 bg-zinc-800/80 hover:bg-zinc-800 border border-zinc-700/50 rounded-lg text-xs font-bold text-zinc-200 transition-colors">
                    Back
                </button>
                <button id="details-watchlist-btn" class="flex-1 py-3 bg-brand hover:bg-brand-hover text-white rounded-lg text-xs font-bold tracking-wider transition-all flex items-center justify-center space-x-1.5">
                    <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"></path>
                    </svg>
                    <span id="details-watchlist-label">Add to List</span>
                </button>
            </div>

        </div>
    </div>

        <!-- Appended programmatically -->
    </div>

        // Custom Security Protocols
        function initSecurity() {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if (e.key === 'F12' || 
                    (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                    (e.ctrlKey && e.key === 'u')) {
                    e.preventDefault();
                }
            });
            let lastTouchTime = 0;
            document.addEventListener('touchend', e => {
                const now = new Date().getTime();
                if (now - lastTouchTime <= 300) {
                    e.preventDefault();
                }
                lastTouchTime = now;
            }, { passive: false });
        }

        function getWatchlistKey() {
            const userId = tg?.initDataUnsafe?.user?.id || 'guest';
            return `mlhbm_watchlist_${userId}`;

        function loadWatchlistFromStorage() {
            try {
                const key = getWatchlistKey();
                const stored = localStorage.getItem(key);
                watchlist = stored ? JSON.parse(stored) : [];
                updateWatchlistBadge();

                console.error("Watchlist loading failed:", err);
                watchlist = [];

        function toggleWatchlistItem(itemId) {
            try {
                const idx = watchlist.indexOf(itemId);
                if (idx > -1) {
                    watchlist.splice(idx, 1);
                    showToast("Removed from your Watchlist");
                } else {
                    watchlist.push(itemId);
                    showToast("Added to your Watchlist");
                }
                localStorage.setItem(getWatchlistKey(), JSON.stringify(watchlist));
                updateWatchlistBadge();
                renderWatchlist();
                updateDetailsModalButtons();
            } catch (err) {

        function renderHeroSlider() {
            const banners = mediaAssets.slice(0, 4);

            const dotsContainer = document.getElementById('slider-dots');
            if (!track || banners.length === 0) return;

        function updateHeroInfo(item) {
            if (!item) return;
            const elements = {
                title: document.getElementById('hero-title'),
                badge: document.getElementById('hero-badge'),
                year: document.getElementById('hero-year'),
                desc: document.getElementById('hero-desc')

            if (elements.title) elements.title.innerText = item.title;
            if (elements.badge) elements.badge.innerText = item.type;
            if (elements.year) elements.year.innerText = item.year;
            if (elements.desc) elements.desc.innerText = item.description;

            const infoBtn = document.getElementById('hero-info-btn');
            if (infoBtn) {
                infoBtn.onclick = () => openDetailsModal(item.id);
            }

            const favBtn = document.getElementById('hero-fav-btn');
            const favIcon = document.getElementById('hero-fav-icon');
            if (favBtn && favIcon) {
                const isSaved = watchlist.includes(item.id);
                favIcon.setAttribute('fill', isSaved ? 'currentColor' : 'none');
                favIcon.className = isSaved ? 'w-4 h-4 text-brand' : 'w-4 h-4 text-zinc-300';
                
                favBtn.onclick = (e) => {
                    e.stopPropagation();
                    toggleWatchlistItem(item.id);
                    const updatedSave = watchlist.includes(item.id);
                    favIcon.setAttribute('fill', updatedSave ? 'currentColor' : 'none');
                    favIcon.className = updatedSave ? 'w-4 h-4 text-brand' : 'w-4 h-4 text-zinc-300';
                };
            }
        }

        function goToSlide(index) {
            const track = document.getElementById('hero-track');
            const dots = document.getElementById('slider-dots')?.children;
            if (!track || index < 0 || index >= dots.length) return;

            currentHeroIndex = index;
            track.style.transform = `translateX(-${index * 100}%)`;

            for (let i = 0; i < dots.length; i++) {
                if (i === index) {
                    dots[i].className = "w-1.5 h-1.5 rounded-full transition-all duration-300 bg-brand w-3";
                } else {
                    dots[i].className = "w-1.5 h-1.5 rounded-full transition-all duration-300 bg-zinc-600";
                }
            }

            const featuredItems = mediaAssets.slice(0, 4);
            updateHeroInfo(featuredItems[index]);
        }

        function startHeroTimer() {
            stopHeroTimer();
            heroTimer = setInterval(() => {
                const total = Math.min(mediaAssets.length, 4);
                if (total > 1) {
                    goToSlide((currentHeroIndex + 1) % total);
                }
            }, 6000);
        }

        function stopHeroTimer() {
            if (heroTimer) clearInterval(heroTimer);
        }

        function resetHeroTimer() {
            stopHeroTimer();
            startHeroTimer();
        }

        function setupSliderGestures() {
            const container = document.getElementById('hero-slider-container');
            if (!container) return;

            container.addEventListener('touchstart', (e) => {
                sliderTouchStartX = e.changedTouches[0].screenX;
                stopHeroTimer();
            }, { passive: true });

            container.addEventListener('touchend', (e) => {
                sliderTouchEndX = e.changedTouches[0].screenX;
                handleSwipe();
                startHeroTimer();
            }, { passive: true });
        }

        function handleSwipe() {
            const threshold = 50;
            const diff = sliderTouchStartX - sliderTouchEndX;
            const total = Math.min(mediaAssets.length, 4);

            if (Math.abs(diff) > threshold) {
                if (diff > 0) {
                    goToSlide((currentHeroIndex + 1) % total);
                } else {
                    goToSlide((currentHeroIndex - 1 + total) % total);
                }
            }
        }

            grid.innerHTML = '';

                grid.innerHTML = `<div class="col-span-2 text-center py-10 text-xs text-zinc-500">No categories found.</div>`;

                                renderEpisodes(season.episodes, episodesListContainer);
                            };
                            
                            seasonsContainer.appendChild(pill);
                        });

                        renderEpisodes(item.seasons[0].episodes, episodesListContainer);
                    } else {
                        episodesListContainer.innerHTML = `<div class="text-center py-4 text-xs text-zinc-600">No seasons configured.</div>`;
                    }

                    tabsWrapper.appendChild(seasonsContainer);
                    tabsWrapper.appendChild(episodesListContainer);
                    condPanel.appendChild(tabsWrapper);
                }

                updateDetailsModalButtons();

                const m = document.getElementById('details-modal');
                m.classList.remove('hidden');
                setTimeout(() => {
                    m.querySelector('.glass-panel').classList.remove('translate-y-full');
                }, 50);

            } catch (err) {
                showToast("Error launching movie profiles securely.");
                console.error(err);
            }
        }

        function renderEpisodes(episodes, targetContainer) {
            targetContainer.innerHTML = '';
            if (!episodes || episodes.length === 0) {
                targetContainer.innerHTML = `<div class="text-center py-4 text-xs text-zinc-600">No episodes configured.</div>`;
                return;
            }

            episodes.forEach(ep => {
                const epCard = document.createElement('div');
                epCard.className = "flex items-center justify-between p-2 rounded-lg bg-zinc-900/50 border border-zinc-800/80";
                
                epCard.innerHTML = `
                    <div class="flex items-center space-x-3 overflow-hidden">
                        <div class="relative w-16 h-10 rounded overflow-hidden flex-shrink-0 bg-zinc-800 border border-zinc-700/50">
                            <img class="w-full h-full object-cover" src="${ep.thumbnailUrl || 'https://images.unsplash.com/photo-1509198397868-475647b2a1e5?q=80&w=150'}" alt="${ep.title}">
                            <div class="absolute inset-0 bg-black/20"></div>
                            <span class="absolute bottom-0.5 left-1 text-[8px] font-black text-brand tracking-wider bg-zinc-950/90 px-1 py-0.1 rounded">${ep.episodeNumber}</span>
                        </div>
                        <div class="overflow-hidden">
                            <h4 class="text-[11px] font-bold text-white truncate">${ep.title}</h4>
                            <p class="text-[9px] text-zinc-500">${ep.duration || "N/A"}</p>
                        </div>
                    </div>
                    <a href="${ep.downloadUrl || '#'}" target="_blank" class="w-8 h-8 rounded-full bg-brand/10 hover:bg-brand/20 border border-brand/50 flex items-center justify-center text-brand flex-shrink-0 active:scale-95 transition-all">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                    </a>
                `;
                targetContainer.appendChild(epCard);
            });
        }

        function updateDetailsModalButtons() {
            if (!currentDetailItem) return;
            const isSaved = watchlist.includes(currentDetailItem.id);
            const btn = document.getElementById('details-watchlist-btn');
            const label = document.getElementById('details-watchlist-label');

            if (isSaved) {
                btn.className = "flex-1 py-3 bg-zinc-900 border border-zinc-800 hover:border-zinc-700 text-zinc-300 rounded-lg text-xs font-bold tracking-wider transition-all flex items-center justify-center space-x-1.5";
                label.innerText = "In Watchlist";
            } else {
                btn.className = "flex-1 py-3 bg-brand hover:bg-brand-hover text-white rounded-lg text-xs font-bold tracking-wider transition-all flex items-center justify-center space-x-1.5";
                label.innerText = "Add to List";
            }

            btn.onclick = () => {
                toggleWatchlistItem(currentDetailItem.id);
            };
        }

        function closeDetailsModal() {
            const m = document.getElementById('details-modal');
            if (m) {
                m.querySelector('.glass-panel').classList.add('translate-y-full');
                setTimeout(() => {
                    m.classList.add('hidden');
                    currentDetailItem = null;
                }, 300);
            }
        }

        function handleShareLink(item) {
            const appUrl = tg?.initDataUnsafe?.start_param 
                ? `https://t.me/mlhbm_bot/app?startapp=${item.id}`
                : `https://t.me/mlhbm_bot/app`;

            if (navigator.clipboard) {
                navigator.clipboard.writeText(appUrl)
                    .then(() => showToast("Share Link copied!"))
                    .catch(() => showToast("Failed to copy link."));
            } else {
                showToast("Clipboard unavailable.");
            }
        }

        function initProfileConsole() {
            const btn = document.getElementById('profile-trigger');
            const modal = document.getElementById('profile-modal');
            const bg = document.getElementById('profile-modal-bg');
            const close = document.getElementById('profile-close-btn');

            if (btn && modal) {
                btn.onclick = () => {
                    const tgUser = tg?.initDataUnsafe?.user;
                    
                    if (tgUser) {
                        document.getElementById('user-display-name').innerText = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ') || "Telegram User";
                        document.getElementById('user-handle').innerText = tgUser.username ? `@${tgUser.username}` : '';
                        document.getElementById('user-tg-id').innerText = tgUser.id || "Secure Session";

                        if (tgUser.photo_url) {
                            const img = document.getElementById('user-avatar');
                            const fallback = document.getElementById('user-avatar-fallback');
                            img.src = tgUser.photo_url;
                            img.classList.remove('hidden');
                            fallback.classList.add('hidden');
                        }
                    }

                    modal.classList.remove('hidden');
                    setTimeout(() => {
                        modal.querySelector('.glass-panel').classList.remove('translate-y-full');
                    }, 50);
                };

                const closeAction = () => {
                    modal.querySelector('.glass-panel').classList.add('translate-y-full');
                    setTimeout(() => {
                        modal.classList.add('hidden');
                    }, 300);
                };

                bg.onclick = closeAction;
                close.onclick = closeAction;
            }
        }

        // Initialize Core Engine
        async function initApp() {
            initSecurity();
            loadWatchlistFromStorage();
            initProfileConsole();
            setupSearch();
            setupBrowseView();

            document.getElementById('details-back-btn').onclick = closeDetailsModal;
            document.getElementById('details-modal-bg').onclick = closeDetailsModal;

            const tabs = ['home', 'search', 'browse', 'watchlist'];
            tabs.forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                if (btn) {
                    btn.onclick = () => {
                        switchView(tab);
                    };
                }
            });

            // Fetch Data JSON
            try {
                const response = await fetch('movies.json');
                if (!response.ok) throw new Error("Database load failed.");
                mediaAssets = await response.json();
            } catch (err) {
                console.warn("Using default internal catalog...", err);
                mediaAssets = FALLBACK_DATA;
            }

            renderHeroSlider();
            renderHomeCategories();

            // Handle startapp Deep links
            try {
                if (tg && tg.initDataUnsafe?.start_param) {
                    const deepId = tg.initDataUnsafe.start_param;
                    if (mediaAssets.some(m => m.id === deepId)) {
                        openDetailsModal(deepId);
                    }
                }
            } catch (err) {
                console.error("Deep link parser error:", err);
            }
        }

        window.onload = initApp;
    </script>
</body>
 </html>
