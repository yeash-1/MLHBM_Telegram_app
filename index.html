 <!DOCTYPE html>
<html lang="en" class="h-full select-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLHBM</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#E50914',
                            hover: '#B80710',
                            dark: '#1F0103',
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* Custom security styles */
        body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            scrollbar-width: none; /* Firefox */
        }
        body::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Custom glassmorphism classes */
        .glass-panel {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(63, 63, 70, 0.4);
        }
        .glass-card {
            background: rgba(39, 39, 42, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(63, 63, 70, 0.3);
        }
        /* Page transitions */
        .view-section {
            transition: opacity 0.25s ease-in-out, transform 0.25s ease-in-out;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans h-full flex flex-col overflow-hidden">

    <!-- Global Header -->
    <header class="glass-panel sticky top-0 z-40 flex items-center justify-between px-4 py-3 border-b border-zinc-900">
        <div class="flex items-center space-x-2">
            <span class="text-brand font-extrabold text-xl tracking-wider">MLHBM</span>
        </div>
        <div class="flex items-center space-x-3">
            <button id="notiBtn" class="w-10 h-10 rounded-full flex items-center justify-center text-zinc-400 hover:text-white transition-colors">
                <i class="fa-regular fa-bell text-lg"></i>
            </button>
            <div class="w-10 h-10 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center text-zinc-300">
                <i class="fa-regular fa-user text-sm"></i>
            </div>
        </div>
    </header>

    <!-- Main Viewport Context -->
    <main class="flex-1 overflow-y-auto no-scrollbar pb-24 relative">
        
        <!-- View: Home -->
        <section id="view-home" class="view-section space-y-6">
            <!-- Hero Carousel -->
            <div class="relative w-full aspect-[16/10] overflow-hidden">
                <div id="hero-container" class="w-full h-full relative transition-all duration-500">
                    <!-- Dynamic Hero Inject -->
                </div>
                <!-- Banner gradient overlays -->
                <div class="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/40 to-transparent pointer-events-none"></div>
                <div class="absolute inset-x-0 bottom-0 p-4 flex flex-col justify-end space-y-2 pointer-events-auto">
                    <div class="flex items-center space-x-2">
                        <span id="hero-rating" class="bg-zinc-900/90 text-brand font-bold text-xs px-2 py-0.5 rounded border border-zinc-800"></span>
                        <span id="hero-year" class="text-zinc-300 text-xs font-semibold"></span>
                        <span class="bg-brand/10 text-brand text-[10px] font-bold px-1.5 py-0.5 rounded border border-brand/20">TV</span>
                    </div>
                    <h1 id="hero-title" class="text-2xl font-bold tracking-tight text-white leading-tight"></h1>
                    <p id="hero-desc" class="text-zinc-400 text-xs line-clamp-2 max-w-lg leading-relaxed"></p>
                    
                    <!-- Slider Action Buttons -->
                    <div class="flex items-center space-x-3 pt-2">
                        <button id="hero-info-btn" class="flex-1 bg-zinc-900/90 border border-zinc-800 text-white font-medium text-sm py-2 px-4 rounded-lg flex items-center justify-center space-x-2 active:scale-95 transition-transform backdrop-blur-sm">
                            <i class="fa-solid fa-circle-info"></i>
                            <span>Info</span>
                        </button>
                        <button id="hero-save-btn" class="w-12 bg-zinc-900/90 border border-zinc-800 text-white py-2 rounded-lg flex items-center justify-center active:scale-95 transition-transform backdrop-blur-sm">
                            <i class="fa-regular fa-bookmark text-base"></i>
                        </button>
                    </div>

                    <!-- Slide Indicators -->
                    <div id="carousel-indicators" class="flex items-center justify-center space-x-1.5 pt-3">
                        <!-- Dynamic indicators -->
                    </div>
                </div>
            </div>

            <!-- Custom Rows (Dynamic Categorized Lists) -->
            <div id="home-categories" class="px-4 space-y-6">
                <!-- Dynamic standard category blocks injected dynamically -->
            </div>
        </section>

        <!-- View: Search -->
        <section id="view-search" class="view-section hidden p-4 space-y-4">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500"></i>
                <input type="text" id="search-input" placeholder="Search movies, TV shows..." class="w-full bg-zinc-900 border border-zinc-800 rounded-xl py-3 pl-10 pr-10 text-zinc-100 placeholder-zinc-500 text-sm focus:outline-none focus:border-brand/50 transition-colors">
                <button id="search-clear" class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-white hidden">
                    <i class="fa-solid fa-circle-xmark"></i>
                </button>
            </div>
            
            <div class="flex items-center justify-between text-xs text-zinc-400 font-medium px-1">
                <span id="search-results-count">Type to begin searching</span>
            </div>

            <!-- Grid Layout -->
            <div id="search-results-grid" class="grid grid-cols-2 gap-3 pb-8">
                <!-- Search Result Items -->
            </div>
        </section>

        <!-- View: Browse (Genres) -->
        <section id="view-browse" class="view-section hidden p-4 space-y-4">
            <div class="flex flex-col">
                <h2 class="text-xl font-bold tracking-tight text-white">Categories</h2>
                <p class="text-xs text-zinc-500">Explore movies by dynamic genres</p>
            </div>

            <!-- Categories Grid Structure matching screenshots -->
            <div id="browse-genres-grid" class="grid grid-cols-2 gap-3 pb-8">
                <!-- Injected dynamically -->
            </div>

            <!-- Filtered Genre Catalog Drawer -->
            <div id="genre-filtered-view" class="fixed inset-0 bg-zinc-950 z-50 overflow-y-auto no-scrollbar hidden flex flex-col">
                <header class="glass-panel sticky top-0 z-10 flex items-center justify-between px-4 py-3 border-b border-zinc-900">
                    <button id="genre-close-btn" class="flex items-center space-x-1 text-zinc-400 hover:text-white">
                        <i class="fa-solid fa-chevron-left text-lg"></i>
                        <span class="text-sm font-medium">Browse</span>
                    </button>
                    <h3 id="genre-title-header" class="text-sm font-bold tracking-wider text-white uppercase">Category</h3>
                    <div class="w-8"></div> <!-- Spacer -->
                </header>
                <div class="flex-1 p-4">
                    <div id="genre-filtered-grid" class="grid grid-cols-2 gap-3 pb-8">
                        <!-- Dynamic items -->
                    </div>
                </div>
            </div>
        </section>

        <!-- View: Watchlist -->
        <section id="view-watchlist" class="view-section hidden p-4 space-y-4">
            <div class="flex flex-col">
                <h2 class="text-xl font-bold tracking-tight text-white">My Watchlist</h2>
                <p class="text-xs text-zinc-500">Saved items synced to local profile</p>
            </div>

            <!-- Watchlist Items -->
            <div id="watchlist-empty-state" class="flex flex-col items-center justify-center py-20 text-center space-y-3">
                <div class="w-16 h-16 rounded-full bg-zinc-900/80 border border-zinc-850 flex items-center justify-center text-zinc-600">
                    <i class="fa-regular fa-bookmark text-2xl"></i>
                </div>
                <div class="space-y-1">
                    <p class="text-sm font-medium text-zinc-300">Your Watchlist is empty</p>
                    <p class="text-xs text-zinc-500 max-w-xs">Save movies and series using the bookmark controls to view them later.</p>
                </div>
            </div>

            <div id="watchlist-grid" class="grid grid-cols-2 gap-3 pb-8 hidden">
                <!-- Filtered items dynamically -->
            </div>
        </section>

    </main>

    <!-- Global Movie Detail Overlay/Sheet Context -->
    <div id="movie-detail-overlay" class="fixed inset-0 bg-zinc-950 z-50 flex flex-col transform translate-y-full transition-transform duration-300 overflow-y-auto no-scrollbar hidden">
        <div class="relative w-full aspect-[16/10] bg-zinc-900">
            <img id="detail-backdrop" src="" alt="" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/20 to-transparent"></div>
            <button id="detail-back-top-btn" class="absolute top-4 left-4 w-10 h-10 rounded-full bg-zinc-900/80 backdrop-blur-md border border-zinc-800 text-white flex items-center justify-center active:scale-95 transition-transform">
                <i class="fa-solid fa-chevron-left text-sm"></i>
            </button>
        </div>

        <div class="flex-1 px-4 py-6 space-y-6 flex flex-col justify-between -mt-8 relative z-10">
            <div class="space-y-5">
                <!-- Metadata Info Block -->
                <div class="space-y-2">
                    <div class="flex flex-wrap items-center gap-2">
                        <span id="detail-year" class="text-zinc-400 text-xs font-semibold"></span>
                        <span class="text-zinc-600 text-xs">•</span>
                        <span id="detail-runtime" class="text-zinc-400 text-xs font-semibold"></span>
                        <span class="text-zinc-600 text-xs">•</span>
                        <div class="flex items-center space-x-1">
                            <i class="fa-solid fa-star text-brand text-xs"></i>
                            <span id="detail-rating" class="text-white text-xs font-bold"></span>
                        </div>
                    </div>
                    <h2 id="detail-title" class="text-2xl font-bold tracking-tight text-white leading-tight"></h2>
                    
                    <!-- Dynamic Badges -->
                    <div id="detail-genres-container" class="flex flex-wrap gap-1.5 pt-1">
                        <!-- Dynamic genre labels dynamically structured -->
                    </div>
                </div>

                <!-- Primary Action Interfaces -->
                <div class="grid grid-cols-2 gap-3 pt-1">
                    <a id="detail-download-btn" href="#" target="_blank" class="bg-brand hover:bg-brand-hover text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center space-x-2 active:scale-95 transition-transform shadow-lg shadow-brand/10">
                        <i class="fa-solid fa-download"></i>
                        <span>Download</span>
                    </a>
                    <button id="detail-share-btn" class="bg-zinc-900 border border-zinc-800 text-white font-semibold py-3 px-4 rounded-xl flex items-center justify-center space-x-2 active:scale-95 transition-transform hover:bg-zinc-850">
                        <i class="fa-solid fa-arrow-up-from-bracket"></i>
                        <span>Share</span>
                    </button>
                </div>

                <!-- Description Block -->
                <div class="space-y-2">
                    <h4 class="text-xs uppercase tracking-wider text-zinc-500 font-bold">Overview</h4>
                    <p id="detail-overview" class="text-zinc-300 text-sm leading-relaxed text-justify"></p>
                </div>
            </div>

            <!-- Footer Sheet Actions -->
            <div class="pt-6 border-t border-zinc-900 flex items-center space-x-3 mt-auto">
                <button id="detail-close-btn" class="flex-1 bg-zinc-900 border border-zinc-800 text-zinc-300 py-3 rounded-xl text-sm font-semibold active:scale-95 transition-transform flex items-center justify-center space-x-2">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>Back</span>
                </button>
                <button id="detail-watchlist-btn" class="flex-1 bg-zinc-900 border border-zinc-850 text-white py-3 rounded-xl text-sm font-semibold active:scale-95 transition-transform flex items-center justify-center space-x-2">
                    <i class="fa-regular fa-bookmark"></i>
                    <span id="detail-watchlist-txt">Add to List</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Interactive Navigation System -->
    <nav class="glass-panel fixed bottom-0 inset-x-0 z-45 border-t border-zinc-900 px-3 pb-safe pt-2">
        <div class="max-w-md mx-auto flex items-center justify-around h-12">
            <button data-target="home" class="nav-item flex flex-col items-center justify-center space-y-1 text-brand active:scale-90 transition-transform">
                <i class="fa-solid fa-house text-lg"></i>
                <span class="text-[10px] font-bold">Home</span>
            </button>
            <button data-target="search" class="nav-item flex flex-col items-center justify-center space-y-1 text-zinc-500 hover:text-zinc-300 active:scale-90 transition-transform">
                <i class="fa-solid fa-magnifying-glass text-lg"></i>
                <span class="text-[10px] font-semibold">Search</span>
            </button>
            <button data-target="browse" class="nav-item flex flex-col items-center justify-center space-y-1 text-zinc-500 hover:text-zinc-300 active:scale-90 transition-transform">
                <i class="fa-solid fa-compass text-lg"></i>
                <span class="text-[10px] font-semibold">Browse</span>
            </button>
            <button data-target="watchlist" class="nav-item flex flex-col items-center justify-center space-y-1 text-zinc-500 hover:text-zinc-300 active:scale-90 transition-transform">
                <i class="fa-solid fa-bookmark text-lg"></i>
                <span class="text-[10px] font-semibold">Watchlist</span>
            </button>
        </div>
    </nav>

    <!-- Visual Dynamic Toast Notifications -->
    <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 z-50 glass-panel border border-brand/20 px-4 py-2 rounded-xl flex items-center space-x-2 transform translate-y-10 opacity-0 transition-all pointer-events-none duration-350">
        <i class="fa-solid fa-circle-check text-brand text-sm"></i>
        <span id="toast-text" class="text-xs font-semibold text-zinc-200">Shared successfully</span>
    </div>

    <!-- JavaScript Application Handler -->

        document.addEventListener('selectstart', e => e.preventDefault());

            if (e.keyCode === 123 || 
                (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || 
                (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();

        });

        let appState = {
            activeTab: 'home',
            movies: [],
            categories: [],
            banners: [],
            currentHeroIndex: 0,
            watchlist: [],
            userId: 'guest',
            heroTimer: null

        };

        // Initialize Telegram SDK
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.headerColor = '#09090b'; // matching bg-zinc-950
            tg.backgroundColor = '#09090b';
            if (tg.initDataUnsafe?.user?.id) {
                appState.userId = String(tg.initDataUnsafe.user.id);
            }
        }

        // Event Listeners initialization
        document.addEventListener('DOMContentLoaded', initializeApp);

        async function initializeApp() {
            setupNavigation();
            setupSearch();
            setupDetailsView();
            await loadData();
            loadWatchlist();
            renderAllViews();
        }

        // Pull database dynamically with fallback state
        async function loadData() {
            try {
                const response = await fetch('movies.json');
                if (!response.ok) throw new Error('Network file access error');
                const data = await response.json();
                appState.movies = data.movies || [];
                appState.categories = data.categories || [];
                appState.banners = data.banners || [];
            } catch (err) {
                console.warn('Syncing with internal standard database structure:', err);
                appState.movies = fallbackDatabase.movies;
                appState.categories = fallbackDatabase.categories;
                appState.banners = fallbackDatabase.banners;
            }
        }

        // Sync local storage profile
        function loadWatchlist() {
            const stored = localStorage.getItem(`mlhbm_watchlist_${appState.userId}`);
            appState.watchlist = stored ? JSON.parse(stored) : [];
        }

        function saveWatchlist() {
            localStorage.setItem(`mlhbm_watchlist_${appState.userId}`, JSON.stringify(appState.watchlist));
            updateWatchlistView();
        }

        // Navigation Engine
        function setupNavigation() {
            const navButtons = document.querySelectorAll('.nav-item');
            navButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const target = btn.getAttribute('data-target');
                    switchTab(target);
                });
            });
        }

        function switchTab(tabId) {
            appState.activeTab = tabId;
            
            // Toggle screen sections
            document.querySelectorAll('.view-section').forEach(section => {
                section.classList.add('hidden');
                section.style.opacity = '0';
                section.style.transform = 'translateY(10px)';
            });

            const activeSection = document.getElementById(`view-${tabId}`);
            if (activeSection) {
                activeSection.classList.remove('hidden');
                setTimeout(() => {
                    activeSection.style.opacity = '1';
                    activeSection.style.transform = 'translateY(0)';
                }, 50);
            }

            // Update Navigation Highlights
            document.querySelectorAll('.nav-item').forEach(btn => {
                const icon = btn.querySelector('i');
                const label = btn.querySelector('span');
                const isTarget = btn.getAttribute('data-target') === tabId;
                
                if (isTarget) {
                    btn.className = "nav-item flex flex-col items-center justify-center space-y-1 text-brand active:scale-90 transition-transform";
                    icon.className = icon.className.replace('fa-regular', 'fa-solid');
                    label.classList.add('font-bold');
                } else {
                    btn.className = "nav-item flex flex-col items-center justify-center space-y-1 text-zinc-500 hover:text-zinc-300 active:scale-90 transition-transform";
                    icon.className = icon.className.replace('fa-solid', 'fa-regular');
                    label.classList.remove('font-bold');
                }
            });

            if (tabId === 'watchlist') {
                updateWatchlistView();
            }
        }

        // Render Controller
        function renderAllViews() {
            renderHeroSlider();
            renderHomeCategories();
            renderBrowseGenres();
            updateWatchlistView();
        }

        // Slider Component
        function renderHeroSlider() {
            const container = document.getElementById('hero-container');
            const indicators = document.getElementById('carousel-indicators');
            if (!appState.banners || appState.banners.length === 0) return;

            // Render Hero Banner
            updateHeroView(0);

            // Create dot indicators
            indicators.innerHTML = '';
            appState.banners.forEach((_, idx) => {
                const indicator = document.createElement('button');
                indicator.className = `w-1.5 h-1.5 rounded-full transition-all duration-300 ${idx === 0 ? 'bg-brand w-3' : 'bg-zinc-600'}`;
                indicator.addEventListener('click', () => {
                    clearInterval(appState.heroTimer);
                    updateHeroView(idx);
                    startHeroRotation();
                });
                indicators.appendChild(indicator);
            });

            startHeroRotation();
        }

        function updateHeroView(index) {
            appState.currentHeroIndex = index;
            const banner = appState.banners[index];
            const container = document.getElementById('hero-container');

            container.innerHTML = `
                <img src="${banner.backdrop}" alt="${banner.title}" class="w-full h-full object-cover select-none pointer-events-none absolute inset-0 transition-opacity duration-500 opacity-0" id="hero-img">
            `;
            
            // Fade-in effect
            const img = document.getElementById('hero-img');
            setTimeout(() => img.classList.remove('opacity-0'), 50);

            // Update Metadata labels
            document.getElementById('hero-title').textContent = banner.title;
            document.getElementById('hero-rating').innerHTML = `<i class="fa-solid fa-star text-brand text-[10px]"></i> ${banner.rating}`;
            document.getElementById('hero-year').textContent = banner.year;
            document.getElementById('hero-desc').textContent = banner.overview;

            // Attach dynamic info button logic
            document.getElementById('hero-info-btn').onclick = () => showMovieDetails(banner);
            
            // Setup dynamic bookmark toggle inside hero
            const saveBtn = document.getElementById('hero-save-btn');
            const isSaved = appState.watchlist.includes(banner.id);
            saveBtn.innerHTML = isSaved ? `<i class="fa-solid fa-bookmark text-brand text-base"></i>` : `<i class="fa-regular fa-bookmark text-base"></i>`;
            saveBtn.onclick = () => {
                toggleWatchlist(banner.id);
                updateHeroView(index);
            };

            // Update dot sizes
            const dots = document.getElementById('carousel-indicators').children;
            Array.from(dots).forEach((dot, idx) => {
                if (idx === index) {
                    dot.className = "w-1.5 h-1.5 rounded-full transition-all duration-300 bg-brand w-3";
                } else {
                    dot.className = "w-1.5 h-1.5 rounded-full transition-all duration-300 bg-zinc-600";
                }
            });
        }

        function startHeroRotation() {
            if (appState.banners.length <= 1) return;
            clearInterval(appState.heroTimer);
            appState.heroTimer = setInterval(() => {
                let nextIdx = (appState.currentHeroIndex + 1) % appState.banners.length;
                updateHeroView(nextIdx);
            }, 5500);
        }

        // Categorized list block render matches design
        function renderHomeCategories() {
            const section = document.getElementById('home-categories');
            section.innerHTML = '';

            appState.categories.forEach(categoryName => {
                const matchedMovies = appState.movies.filter(m => m.category === categoryName);
                if (matchedMovies.length === 0) return;

                const catBlock = document.createElement('div');
                catBlock.className = "space-y-3";
                
                // Block Header block
                catBlock.innerHTML = `
                    <div class="flex items-center space-x-2">
                        <div class="w-1 h-4 bg-brand rounded-full"></div>
                        <h3 class="text-base font-bold text-white tracking-tight">${categoryName}</h3>
                    </div>
                `;

                // Horizontal Carousel Row Context
                const carousel = document.createElement('div');
                carousel.className = "flex overflow-x-auto space-x-3.5 pb-2 no-scrollbar scroll-smooth snap-x";
                
                matchedMovies.forEach(movie => {
                    const item = document.createElement('div');
                    item.className = "w-[125px] flex-shrink-0 snap-start space-y-2 group active:scale-95 transition-transform";
                    item.addEventListener('click', () => showMovieDetails(movie));

                    item.innerHTML = `
                        <div class="relative aspect-[2/3] w-full rounded-xl overflow-hidden glass-card">
                            <img src="${movie.poster}" alt="${movie.title}" class="w-full h-full object-cover pointer-events-none select-none">
                            <div class="absolute top-1.5 left-1.5 glass-panel border border-zinc-800/60 rounded px-1.5 py-0.5 flex items-center space-x-0.5">
                                <i class="fa-solid fa-star text-brand text-[9px]"></i>
                                <span class="text-white font-extrabold text-[9px]">${movie.rating}</span>
                            </div>
                        </div>
                        <div class="space-y-0.5 px-1">
                            <h4 class="text-xs font-bold text-zinc-100 truncate group-hover:text-brand transition-colors">${movie.title}</h4>
                            <p class="text-[10px] text-zinc-500 font-semibold">${movie.year}</p>
                        </div>
                    `;
                    carousel.appendChild(item);
                });

                catBlock.appendChild(carousel);
                section.appendChild(catBlock);
            });
        }

        // Browse Categories view matches original card layouts grid (Image 2)
        function renderBrowseGenres() {
            const grid = document.getElementById('browse-genres-grid');
            grid.innerHTML = '';

            // Unique genre structures extracted from complete database context
            const genresSet = new Set();
            appState.movies.forEach(m => m.genres?.forEach(g => genresSet.add(g)));
            const genres = Array.from(genresSet);

            // Dynamic layout mapping with beautiful linear design patterns
            const presetGradients = [
                'from-red-950/80 to-zinc-950/90',
                'from-zinc-900/80 to-zinc-950/90',
                'from-zinc-850/80 to-zinc-950/90',
                'from-brand-dark/80 to-zinc-950/90'
            ];

            genres.forEach((genre, idx) => {
                const card = document.createElement('div');
                card.className = "relative aspect-[16/10] rounded-xl overflow-hidden glass-card group cursor-pointer active:scale-95 transition-transform flex flex-col justify-between p-3 border border-zinc-800/40";
                
                // Get one fallback backdrop image from the current matched movies
                const matchedMovie = appState.movies.find(m => m.genres?.includes(genre));
                const bgImage = matchedMovie ? matchedMovie.poster : '';

                card.innerHTML = `
                    <div class="absolute inset-0 bg-cover bg-center opacity-20 group-hover:opacity-30 transition-opacity" style="background-image: url('${bgImage}')"></div>
                    <div class="absolute inset-0 bg-gradient-to-br ${presetGradients[idx % presetGradients.length]} mix-blend-multiply"></div>
                    
                    <span class="text-xs bg-brand/10 text-brand font-bold px-2 py-0.5 rounded border border-brand/20 self-start z-10 uppercase tracking-wider">${genre}</span>
                    <div class="flex items-center justify-between z-10 pt-4">
                        <h4 class="text-base font-extrabold text-white tracking-tight">${genre}</h4>
                        <div class="w-7 h-7 rounded-full bg-zinc-900/95 border border-zinc-800/80 flex items-center justify-center text-zinc-400 group-hover:text-brand transition-colors">
                            <i class="fa-solid fa-chevron-right text-xs"></i>
                        </div>
                    </div>
                `;

                card.addEventListener('click', () => openGenreDrawer(genre));
                grid.appendChild(card);
            });
        }

        // Genre Drawer controller
        function openGenreDrawer(genre) {
            const drawer = document.getElementById('genre-filtered-view');
            const grid = document.getElementById('genre-filtered-grid');
            const titleHeader = document.getElementById('genre-title-header');

            titleHeader.textContent = genre;
            grid.innerHTML = '';

            const matched = appState.movies.filter(m => m.genres?.includes(genre));
            matched.forEach(movie => {
                const item = document.createElement('div');
                item.className = "space-y-2 group active:scale-95 transition-transform";
                item.addEventListener('click', () => showMovieDetails(movie));

                item.innerHTML = `
                    <div class="relative aspect-[2/3] w-full rounded-xl overflow-hidden glass-card">
                        <img src="${movie.poster}" alt="${movie.title}" class="w-full h-full object-cover pointer-events-none select-none">
                        <div class="absolute top-1.5 left-1.5 glass-panel border border-zinc-800/60 rounded px-1.5 py-0.5 flex items-center space-x-0.5">
                            <i class="fa-solid fa-star text-brand text-[9px]"></i>
                            <span class="text-white font-extrabold text-[9px]">${movie.rating}</span>
                        </div>
                    </div>
                    <div class="space-y-0.5 px-1">
                        <h4 class="text-xs font-bold text-zinc-100 truncate group-hover:text-brand transition-colors">${movie.title}</h4>
                        <p class="text-[10px] text-zinc-500 font-semibold">${movie.year}</p>
                    </div>
                `;
                grid.appendChild(item);
            });

            drawer.classList.remove('hidden');
            setTimeout(() => {
                drawer.style.transform = 'translateY(0)';
            }, 50);

            // Drawer controls
            document.getElementById('genre-close-btn').onclick = () => {
                drawer.classList.add('hidden');
            };
        }

        // Live Search implementation context
        function setupSearch() {
            const input = document.getElementById('search-input');
            const clearBtn = document.getElementById('search-clear');
            const countLabel = document.getElementById('search-results-count');
            const grid = document.getElementById('search-results-grid');

            input.addEventListener('input', () => {
                const query = input.value.trim().toLowerCase();
                
                if (query.length > 0) {
                    clearBtn.classList.remove('hidden');
                } else {
                    clearBtn.classList.add('hidden');
                    countLabel.textContent = "Type to begin searching";
                    grid.innerHTML = '';
                    return;
                }

                // Filtering algorithms matches titles and description
                const matched = appState.movies.filter(m => 
                    m.title.toLowerCase().includes(query) || 
                    m.overview.toLowerCase().includes(query) ||
                    m.genres?.some(g => g.toLowerCase().includes(query))
                );

                countLabel.textContent = `${matched.length} ${matched.length === 1 ? 'result' : 'results'} found`;
                grid.innerHTML = '';

                matched.forEach(movie => {
                    const item = document.createElement('div');
                    item.className = "space-y-2 group active:scale-95 transition-transform";
                    item.addEventListener('click', () => showMovieDetails(movie));

                    item.innerHTML = `
                        <div class="relative aspect-[2/3] w-full rounded-xl overflow-hidden glass-card">
                            <img src="${movie.poster}" alt="${movie.title}" class="w-full h-full object-cover pointer-events-none select-none">
                            <div class="absolute top-1.5 left-1.5 glass-panel border border-zinc-800/60 rounded px-1.5 py-0.5 flex items-center space-x-0.5">
                                <i class="fa-solid fa-star text-brand text-[9px]"></i>
                                <span class="text-white font-extrabold text-[9px]">${movie.rating}</span>
                            </div>
                        </div>
                        <div class="space-y-0.5 px-1">
                            <h4 class="text-xs font-bold text-zinc-100 truncate group-hover:text-brand transition-colors">${movie.title}</h4>
                            <p class="text-[10px] text-zinc-500 font-semibold">${movie.year}</p>
                        </div>
                    `;
                    grid.appendChild(item);
                });
            });

            clearBtn.addEventListener('click', () => {
                input.value = '';
                clearBtn.classList.add('hidden');
                countLabel.textContent = "Type to begin searching";
                grid.innerHTML = '';
                input.focus();
            });
        }

        // Watchlist update handlers
        function updateWatchlistView() {
            const emptyState = document.getElementById('watchlist-empty-state');
            const grid = document.getElementById('watchlist-grid');

            const savedMovies = appState.movies.filter(m => appState.watchlist.includes(m.id));

            if (savedMovies.length === 0) {
                emptyState.classList.remove('hidden');
                grid.classList.add('hidden');
            } else {
                emptyState.classList.add('hidden');
                grid.classList.remove('hidden');
                grid.innerHTML = '';

                savedMovies.forEach(movie => {
                    const item = document.createElement('div');
                    item.className = "space-y-2 group active:scale-95 transition-transform";
                    item.addEventListener('click', () => showMovieDetails(movie));

                    item.innerHTML = `
                        <div class="relative aspect-[2/3] w-full rounded-xl overflow-hidden glass-card">
                            <img src="${movie.poster}" alt="${movie.title}" class="w-full h-full object-cover pointer-events-none select-none">
                            <div class="absolute top-1.5 left-1.5 glass-panel border border-zinc-800/60 rounded px-1.5 py-0.5 flex items-center space-x-0.5">
                                <i class="fa-solid fa-star text-brand text-[9px]"></i>
                                <span class="text-white font-extrabold text-[9px]">${movie.rating}</span>
                            </div>
                        </div>
                        <div class="space-y-0.5 px-1">
                            <h4 class="text-xs font-bold text-zinc-100 truncate group-hover:text-brand transition-colors">${movie.title}</h4>
                            <p class="text-[10px] text-zinc-500 font-semibold">${movie.year}</p>
                        </div>
                    `;
                    grid.appendChild(item);
                });
            }
        }

        function toggleWatchlist(movieId) {
            const idx = appState.watchlist.indexOf(movieId);
            if (idx === -1) {
                appState.watchlist.push(movieId);
                showToast("Added to Watchlist");
            } else {
                appState.watchlist.splice(idx, 1);
                showToast("Removed from Watchlist");
            }
            saveWatchlist();
        }

        // Movie Detail Modal engine with transition sheets
        function setupDetailsView() {
            const overlay = document.getElementById('movie-detail-overlay');
            const closeBtn = document.getElementById('detail-close-btn');
            const backTopBtn = document.getElementById('detail-back-top-btn');

            const hideDetails = () => {
                overlay.style.transform = 'translateY(100%)';
                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 300);
            };

            closeBtn.addEventListener('click', hideDetails);
            backTopBtn.addEventListener('click', hideDetails);
        }

        function showMovieDetails(movie) {
            const overlay = document.getElementById('movie-detail-overlay');
            
            // Render basic parameters
            document.getElementById('detail-backdrop').src = movie.backdrop;
            document.getElementById('detail-title').textContent = movie.title;
            document.getElementById('detail-year').textContent = movie.year;
            document.getElementById('detail-runtime').textContent = movie.runtime;
            document.getElementById('detail-rating').textContent = movie.rating;
            document.getElementById('detail-overview').textContent = movie.overview;

            // Direct actions integration
            const downloadBtn = document.getElementById('detail-download-btn');
            downloadBtn.href = movie.downloadUrl;

            // Handle multiple tag values dynamically matches requirements
            const genresContainer = document.getElementById('detail-genres-container');
            genresContainer.innerHTML = '';
            if (movie.genres && Array.isArray(movie.genres)) {
                movie.genres.forEach(g => {
                    const pill = document.createElement('span');
                    pill.className = "bg-brand/10 text-brand text-[10px] font-bold px-2 py-0.5 rounded border border-brand/20 uppercase tracking-wide";
                    pill.textContent = g;
                    genresContainer.appendChild(pill);
                });
            }

            // Sync dynamic watchlist interactions
            updateWatchlistBtnUI(movie.id);

            const watchlistBtn = document.getElementById('detail-watchlist-btn');
            watchlistBtn.onclick = () => {
                toggleWatchlist(movie.id);
                updateWatchlistBtnUI(movie.id);
            };

            // Programmatic dynamic share link configuration
            const shareBtn = document.getElementById('detail-share-btn');
            shareBtn.onclick = () => {
                let botUsername = "your_telegram_bot"; // Change this parameter as required
                let shareLink = `https://t.me/${botUsername}/app?startapp=id_${movie.id}`;
                
                navigator.clipboard.writeText(shareLink).then(() => {
                    showToast("Share link copied to clipboard");
                }).catch(() => {
                    showToast("Failed to copy link");
                });
            };

            // Overlay display transitions animation
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.style.transform = 'translateY(0)';
            }, 50);
        }

        function updateWatchlistBtnUI(movieId) {
            const watchlistBtn = document.getElementById('detail-watchlist-btn');
            const label = document.getElementById('detail-watchlist-txt');
            const icon = watchlistBtn.querySelector('i');
            const isSaved = appState.watchlist.includes(movieId);

            if (isSaved) {
                watchlistBtn.className = "flex-1 bg-brand text-white py-3 rounded-xl text-sm font-semibold active:scale-95 transition-transform flex items-center justify-center space-x-2";
                icon.className = "fa-solid fa-bookmark";
                label.textContent = "Saved";
            } else {
                watchlistBtn.className = "flex-1 bg-zinc-900 border border-zinc-850 text-white py-3 rounded-xl text-sm font-semibold active:scale-95 transition-transform flex items-center justify-center space-x-2";
                icon.className = "fa-regular fa-bookmark";
                label.textContent = "Add to List";
            }
        }

        // Action Toast System
        function showToast(message) {
            const toast = document.getElementById('toast');
            const text = document.getElementById('toast-text');

            text.textContent = message;
            toast.classList.remove('opacity-0', 'translate-y-10');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-10');
            }, 2500);
        }
    </script>
</body>
