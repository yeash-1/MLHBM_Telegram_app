 <!DOCTYPE html>
<html lang="en" class="h-full select-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLHBM</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            red: '#E50914',
                            redHover: '#B20710',
                            zincDark: '#09090b',
                            zincCard: '#121214'
                        }
                    },
                    boxShadow: {
                        'brand-glow': '0 0 10px rgba(229, 9, 20, 0.3)',
                        'glass': 'inset 0 1px 1px rgba(255, 255, 255, 0.05)'
                    }
                }
            }
        }
    </script>
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #09090b;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        /* Hide Scrollbars */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Custom Glassmorphism styles */
        .glass-panel {
            background: rgba(18, 18, 20, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(63, 63, 70, 0.25);
        }
        .glass-header {
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="h-full text-zinc-100 flex flex-col justify-between">

    <!-- Premium Header -->
    <header class="fixed top-0 left-0 right-0 z-40 glass-header border-b border-zinc-900/50 px-4 py-2 flex items-center justify-between h-[45px]">
        <div class="flex items-center gap-2">
            <span class="text-brand-red font-extrabold tracking-widest text-base shadow-sm">[MLHBM]</span>
        </div>
        <button id="profileBtn" class="w-6.5 h-6.5 rounded-full overflow-hidden border border-zinc-800/80 focus:outline-none transition-transform active:scale-90">
            <div id="profileAvatarFallback" class="w-full h-full bg-zinc-800 flex items-center justify-center text-[9px] font-bold text-zinc-300">
                U
            </div>
            <img id="profileAvatarImg" class="w-full h-full object-cover hidden" alt="Avatar">
        </button>
    </header>

    <!-- Main Views Container -->
    <main class="flex-1 overflow-y-auto pt-[45px] pb-[45px]">
        
        <!-- View: Home -->
        <div id="view-home" class="view-panel space-y-5">
            <!-- Hero Slider -->
            <div class="relative w-full aspect-[16/10] sm:aspect-[16/9] bg-zinc-950 overflow-hidden" id="heroSliderContainer">
                <div id="heroWrapper" class="w-full h-full flex transition-transform duration-500 ease-out">
                    <!-- Slides parsed dynamically -->
                </div>
                <!-- Premium Vignette overlays -->
                <div class="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/15 to-transparent pointer-events-none"></div>
                <div class="absolute inset-x-0 bottom-0 p-4 pt-16 bg-gradient-to-t from-zinc-950 to-transparent flex flex-col justify-end">
                    <div id="sliderMeta" class="space-y-1">
                        <!-- Dynamic metadata loaded by controller -->
                    </div>
                </div>
                <!-- Navigation Dots -->
                <div class="absolute bottom-4 right-4 flex gap-1 z-10" id="sliderDots">
                    <!-- Dots parsed dynamically -->
                </div>
            </div>

            <!-- Category Rows -->
            <div id="homeCategories" class="px-4 space-y-5 pb-4">
                <!-- Rows load dynamically -->
            </div>
        </div>

        <!-- View: Search -->
        <div id="view-search" class="view-panel hidden px-4 py-4 space-y-4">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Search title, genre, year..." 
                    class="w-full h-10 bg-zinc-900/80 border border-zinc-800/40 rounded-lg px-4 pl-9 text-xs text-zinc-200 focus:outline-none focus:border-brand-red/80 focus:ring-1 focus:ring-brand-red/30 transition-all">
                <span class="absolute left-3 top-3 text-zinc-500">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <button id="clearSearchBtn" class="absolute right-3 top-3 text-zinc-500 hidden">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div id="searchResultsCount" class="text-[10px] uppercase font-bold tracking-wider text-zinc-500 hidden"></div>
            <div id="searchResultsGrid" class="grid grid-cols-3 gap-2"></div>
        </div>

        <!-- View: Browse -->
        <div id="view-browse" class="view-panel hidden px-4 py-4 space-y-4">
            <!-- Sleek Toggle Switch -->
            <div class="flex bg-zinc-900/90 p-1 rounded-lg border border-zinc-800/30">
                <button id="browseTypeMovie" class="flex-1 py-1 text-xs font-bold rounded-md transition-all bg-brand-red text-white shadow-brand-glow">Movies</button>
                <button id="browseTypeSeries" class="flex-1 py-1 text-xs font-bold text-zinc-400 rounded-md transition-all">TV Shows</button>
            </div>

            <div class="space-y-3">
                <h3 class="text-[10px] font-bold text-zinc-500 tracking-wider uppercase">Browse by Genre</h3>
                <div id="genreGrid" class="grid grid-cols-2 gap-2.5">
                    <!-- Genre collage cards -->
                </div>
            </div>
        </div>

        <!-- View: Watchlist -->
        <div id="view-watchlist" class="view-panel hidden px-4 py-4 space-y-4">
            <h2 class="text-sm font-bold tracking-wider uppercase text-zinc-400">My Watchlist</h2>

                </div>
                <p class="text-xs text-zinc-500 tracking-wide">Your watchlist is currently empty</p>
            </div>
        </div>

    </main>

        </button>
        <button data-target="search" class="nav-tab flex-1 flex flex-col items-center justify-center text-zinc-500 hover:text-zinc-350 transition-all">

            <div class="w-0.75 h-0.75 rounded-full bg-brand-red mt-0.5 opacity-0 transition-opacity" id="indicator-browse"></div>

        </button>

        <div id="detailsModalContent" class="min-h-full pb-8">

                <div class="flex justify-between">
                    <span>Telegram ID:</span>

                </div>
                <div class="flex justify-between">

        </div>
    </div>

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && e.key === 'I') || 
                (e.ctrlKey && e.shiftKey && e.key === 'C') || 
                (e.ctrlKey && e.shiftKey && e.key === 'J') || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
            }
        });
        document.addEventListener('gesturestart', e => e.preventDefault());

        const state = {
            tgUser: null,
            userId: 'guest',
            watchlist: [],
            moviesData: [],
            activeSlide: 0,
            slideTimer: null,
            touchStartX: 0,
            touchEndX: 0,
            activeBrowseType: 'movie'
        };

        // Initialize TG API safely
        let tgInstance = null;
        if (window.Telegram && window.Telegram.WebApp) {
            tgInstance = window.Telegram.WebApp;
            tgInstance.ready();
            tgInstance.expand();
            if (tgInstance.initDataUnsafe && tgInstance.initDataUnsafe.user) {
                state.tgUser = tgInstance.initDataUnsafe.user;
                state.userId = state.tgUser.id.toString();
            }
        }

        function loadWatchlist() {
            try {
                const stored = localStorage.getItem(`watchlist_${state.userId}`);
                state.watchlist = stored ? JSON.parse(stored) : [];
            } catch (e) {
                state.watchlist = [];
            }
        }

        function saveWatchlist() {
            try {

            } catch (e) {}

        async function fetchMoviesData() {
            try {
                const response = await fetch('movies.json');
                if (response.ok) {
                    state.moviesData = await response.json();
                } else {
                    state.moviesData = mockFallbackData;
                }
            } catch (err) {
                state.moviesData = mockFallbackData;
            }
        }

        function renderProfileInfo() {
            if (state.tgUser) {
                if (state.tgUser.photo_url) {
                    document.getElementById('profileAvatarImg').src = state.tgUser.photo_url;
                    document.getElementById('profileAvatarImg').classList.remove('hidden');
                    document.getElementById('profileAvatarFallback').classList.add('hidden');
                    
                    document.getElementById('profileModalAvatarImg').src = state.tgUser.photo_url;
                    document.getElementById('profileModalAvatarImg').classList.remove('hidden');
                    document.getElementById('profileModalInitials').classList.add('hidden');
                } else {
                    const initials = (state.tgUser.first_name || 'U')[0].toUpperCase();
                    document.getElementById('profileAvatarFallback').innerText = initials;
                    document.getElementById('profileModalInitials').innerText = initials;
                }
                
                const displayName = [state.tgUser.first_name, state.tgUser.last_name].filter(Boolean).join(' ');
                document.getElementById('profileModalName').innerText = displayName || 'User';
                document.getElementById('profileModalUsername').innerText = state.tgUser.username ? `@${state.tgUser.username}` : '';
                document.getElementById('profileModalId').innerText = state.tgUser.id;
            } else {
                document.getElementById('profileAvatarFallback').innerText = 'G';
                document.getElementById('profileModalInitials').innerText = 'G';
            }
            document.getElementById('profileModalWatchlistCount').innerText = state.watchlist.length;
        }

        function renderHeroSlider() {
            const sliderItems = state.moviesData.filter(m => m.backdrop).slice(0, 5);
            const wrapper = document.getElementById('heroWrapper');
            const dotsContainer = document.getElementById('sliderDots');
            
            wrapper.innerHTML = '';
            dotsContainer.innerHTML = '';
            
            if (sliderItems.length === 0) {
                document.getElementById('heroSliderContainer').classList.add('hidden');
                return;
            } else {
                document.getElementById('heroSliderContainer').classList.remove('hidden');
            }

            sliderItems.forEach((item, index) => {
                const slide = document.createElement('div');
                slide.className = 'w-full h-full flex-shrink-0 relative';
                slide.style.width = '100vw';
                slide.innerHTML = `<img class="w-full h-full object-cover" src="${item.backdrop}" alt="${item.title}">`;
                wrapper.appendChild(slide);

                const dot = document.createElement('button');
                dot.className = `w-1 h-1 rounded-full transition-all duration-300 ${index === 0 ? 'bg-brand-red w-3' : 'bg-zinc-600'}`;
                dot.setAttribute('data-index', index);
                dotsContainer.appendChild(dot);
            });

            dotsContainer.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    clearInterval(state.slideTimer);
                    goToSlide(parseInt(btn.getAttribute('data-index')));
                });
            });

            state.activeSlide = 0;
            updateSliderMeta(sliderItems[0]);
            startSliderAutoplay();
        }

        function goToSlide(index) {
            const sliderItems = state.moviesData.filter(m => m.backdrop).slice(0, 5);
            if (index < 0) index = sliderItems.length - 1;
            if (index >= sliderItems.length) index = 0;
            
            state.activeSlide = index;
            const wrapper = document.getElementById('heroWrapper');
            wrapper.style.transform = `translateX(-${index * 100}vw)`;
            
            const dots = document.getElementById('sliderDots').querySelectorAll('button');
            dots.forEach((dot, idx) => {
                if (idx === index) {
                    dot.className = 'w-1 h-1 rounded-full transition-all duration-300 bg-brand-red w-3';
                } else {
                    dot.className = 'w-1 h-1 rounded-full transition-all duration-300 bg-zinc-600';
                }
            });

            updateSliderMeta(sliderItems[index]);
        }

        function updateSliderMeta(item) {
            const metaContainer = document.getElementById('sliderMeta');
            const inWatchlist = state.watchlist.includes(item.id);
            
            metaContainer.innerHTML = `
                <div class="flex items-center gap-1.5 flex-wrap">

                    <span class="text-[9px] text-zinc-400 border border-zinc-850 px-1 py-0.5 rounded uppercase font-semibold tracking-widest">${item.type}</span>

                <div class="flex items-center gap-2 pt-1.5">

                        <svg class="w-3 h-3 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Info
                    </button>
                    <button onclick="toggleWatchlist('${item.id}', event)" class="w-7 h-7 flex items-center justify-center bg-zinc-900/50 backdrop-blur-md border border-zinc-800/50 rounded text-zinc-200 active:scale-95 transition-transform">
                        <svg class="w-3.5 h-3.5 ${inWatchlist ? 'fill-brand-red stroke-brand-red' : 'stroke-zinc-400 fill-none'}" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
                    </button>
                </div>
            `;
        }

        function startSliderAutoplay() {
            clearInterval(state.slideTimer);
            state.slideTimer = setInterval(() => {
                goToSlide(state.activeSlide + 1);
            }, 6000);
        }

        const sliderContainer = document.getElementById('heroSliderContainer');
        sliderContainer.addEventListener('touchstart', e => {
            state.touchStartX = e.changedTouches[0].screenX;
            clearInterval(state.slideTimer);
        });
        
        sliderContainer.addEventListener('touchend', e => {
            state.touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
            startSliderAutoplay();
        });

        function handleSwipe() {
            const swipeThreshold = 50;
            const diffX = state.touchStartX - state.touchEndX;
            if (Math.abs(diffX) > swipeThreshold) {
                if (diffX > 0) goToSlide(state.activeSlide + 1);
                else goToSlide(state.activeSlide - 1);
            }
        }

        function renderHomeCategories() {
            const container = document.getElementById('homeCategories');
            container.innerHTML = '';

            const categories = [...new Set(state.moviesData.map(m => m.category))]
                .filter(c => c && c.toLowerCase() !== 'none');

            categories.forEach(cat => {
                const items = state.moviesData.filter(m => m.category === cat);
                if (items.length === 0) return;

                const row = document.createElement('div');
                row.className = 'space-y-2';
                row.innerHTML = `
                    <div class="flex items-center justify-between">
                        <h2 class="text-[9px] font-extrabold uppercase tracking-widest text-zinc-500">${cat}</h2>
                    </div>
                    <div class="flex gap-2.5 overflow-x-auto no-scrollbar py-0.5">
                        ${items.map(item => `
                            <div onclick="openDetails('${item.id}')" class="flex-none w-[90px] space-y-1 active:scale-95 transition-transform cursor-pointer">
                                <div class="relative aspect-[2/3] bg-zinc-900 rounded-md overflow-hidden border border-zinc-800/20">
                                    <img class="w-full h-full object-cover" src="${item.poster}" alt="${item.title}">
                                    <div class="absolute top-1 left-1 bg-zinc-950/90 border border-zinc-800/30 text-[8px] font-extrabold text-brand-red px-1 rounded backdrop-blur-sm shadow-md">
                                        ★ ${item.rating}
                                    </div>
                                </div>
                                <div class="px-0.5">
                                    <p class="text-[10px] font-bold text-zinc-200 line-clamp-1 leading-normal">${item.title}</p>
                                    <p class="text-[9px] text-zinc-500 font-bold mt-0.5">${item.year}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(row);
            });
        }

        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.getAttribute('data-target');
                
                document.querySelectorAll('.nav-tab').forEach(t => {
                    t.classList.remove('text-brand-red');
                    t.classList.add('text-zinc-500', 'hover:text-zinc-350');
                    const indic = document.getElementById(`indicator-${t.getAttribute('data-target')}`);
                    if (indic) indic.className = "w-0.75 h-0.75 rounded-full bg-brand-red mt-0.5 opacity-0 transition-opacity";
                });
                tab.classList.remove('text-zinc-500', 'hover:text-zinc-350');
                tab.classList.add('text-brand-red');
                const activeIndic = document.getElementById(`indicator-${target}`);
                if (activeIndic) activeIndic.className = "w-0.75 h-0.75 rounded-full bg-brand-red mt-0.5 opacity-100 transition-opacity";

                document.querySelectorAll('.view-panel').forEach(view => {
                    view.classList.add('hidden');
                });
                document.getElementById(`view-${target}`).classList.remove('hidden');

                if (target === 'watchlist') renderWatchlist();
                else if (target === 'browse') renderGenreGrid();
            });
        });

        function renderWatchlist() {
            const grid = document.getElementById('watchlistGrid');
            const emptyState = document.getElementById('watchlistEmptyState');
            grid.innerHTML = '';

            const list = state.moviesData.filter(m => state.watchlist.includes(m.id));

            if (list.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                grid.classList.remove('hidden');

                list.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'space-y-1 active:scale-95 transition-transform cursor-pointer';
                    card.onclick = () => openDetails(item.id);
                    card.innerHTML = `
                        <div class="relative aspect-[2/3] bg-zinc-900 rounded-md overflow-hidden border border-zinc-800/20">
                            <img class="w-full h-full object-cover" src="${item.poster}" alt="${item.title}">
                            <div class="absolute top-1 left-1 bg-zinc-950/90 border border-zinc-800/30 text-[8px] font-extrabold text-brand-red px-1 rounded backdrop-blur-sm">
                                ★ ${item.rating}
                            </div>
                        </div>
                        <div class="px-0.5">
                            <p class="text-[10px] font-bold text-zinc-200 line-clamp-1">${item.title}</p>
                            <p class="text-[9px] text-zinc-500 font-bold mt-0.5">${item.year}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = message;
            toast.className = toast.className.replace('opacity-0 pointer-events-none', 'opacity-100 scale-100');
            
            setTimeout(() => {
                toast.className = toast.className.replace('opacity-100 scale-100', 'opacity-0 pointer-events-none');
            }, 2500);
        }

        function toggleWatchlist(id, event) {
            if (event) event.stopPropagation();
            const index = state.watchlist.indexOf(id);
            if (index > -1) {
                state.watchlist.splice(index, 1);
                showToast("REMOVED FROM WATCHLIST");
            } else {
                state.watchlist.push(id);
                showToast("ADDED TO WATCHLIST");
            }
            saveWatchlist();
            
            const activeSlideData = state.moviesData.filter(m => m.backdrop).slice(0, 5)[state.activeSlide];
            if (activeSlideData && activeSlideData.id === id) {
                updateSliderMeta(activeSlideData);
            }
            renderProfileInfo();
        }

        document.getElementById('browseTypeMovie').addEventListener('click', () => {
            state.activeBrowseType = 'movie';
            document.getElementById('browseTypeMovie').className = 'flex-1 py-1 text-xs font-bold rounded-md transition-all bg-brand-red text-white shadow-brand-glow';
            document.getElementById('browseTypeSeries').className = 'flex-1 py-1 text-xs font-bold text-zinc-400 rounded-md transition-all';
            renderGenreGrid();
        });

        document.getElementById('browseTypeSeries').addEventListener('click', () => {
            state.activeBrowseType = 'series';
            document.getElementById('browseTypeSeries').className = 'flex-1 py-1 text-xs font-bold rounded-md transition-all bg-brand-red text-white shadow-brand-glow';
            document.getElementById('browseTypeMovie').className = 'flex-1 py-1 text-xs font-bold text-zinc-400 rounded-md transition-all';
            renderGenreGrid();
        });

        function renderGenreGrid() {
            const grid = document.getElementById('genreGrid');
            grid.innerHTML = '';

            const filteredItems = state.moviesData.filter(m => m.type === state.activeBrowseType);
            const genres = [...new Set(filteredItems.flatMap(m => m.genres || []))];

            if (genres.length === 0) {
                grid.innerHTML = `<div class="col-span-2 text-center py-10 text-xs text-zinc-500">No items available</div>`;
                return;
            }

            genres.forEach(genre => {
                const matches = filteredItems.filter(m => m.genres.includes(genre));
                const images = matches.slice(0, 4).map(m => m.poster);
                
                const card = document.createElement('div');
                card.className = 'relative aspect-[16/11] bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800/10 flex active:scale-98 transition-transform cursor-pointer';
                card.onclick = () => openGenreBrowse(genre, state.activeBrowseType);

                let imageBlocksHtml = '';
                if (images.length === 1) {
                    imageBlocksHtml = `<img class="w-full h-full object-cover opacity-20" src="${images[0]}" alt="genre bg">`;
                } else if (images.length === 2) {
                    imageBlocksHtml = `
                        <div class="w-1/2 h-full"><img class="w-full h-full object-cover opacity-20" src="${images[0]}"></div>
                        <div class="w-1/2 h-full"><img class="w-full h-full object-cover opacity-20" src="${images[1]}"></div>
                    `;
                } else {
                    imageBlocksHtml = `
                        <div class="w-1/2 h-full flex flex-col">
                            <img class="h-1/2 w-full object-cover opacity-20" src="${images[0]}">
                            <img class="h-1/2 w-full object-cover opacity-20" src="${images[1] || images[0]}">
                        </div>
                        <div class="w-1/2 h-full flex flex-col">
                            <img class="h-1/2 w-full object-cover opacity-20" src="${images[2] || images[0]}">
                            <img class="h-1/2 w-full object-cover opacity-20" src="${images[3] || images[0]}">
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="absolute inset-0 flex">${imageBlocksHtml}</div>
                    <div class="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/80 to-zinc-950/40 flex flex-col justify-end p-3">
                        <span class="text-xs font-extrabold text-white leading-none tracking-wide">${genre}</span>
                        <span class="text-[9px] text-zinc-500 font-bold mt-0.5">EXPLORE →</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openGenreBrowse(genre, type) {
            const tabSearch = document.querySelector('.nav-tab[data-target="search"]');
            tabSearch.click();
            document.getElementById('searchInput').value = genre;
            runSearch(genre);
        }

        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const searchGrid = document.getElementById('searchResultsGrid');
        const searchCount = document.getElementById('searchResultsCount');

        searchInput.addEventListener('input', () => {
            const query = searchInput.value.trim();
            if (query) {
                clearSearchBtn.classList.remove('hidden');
                runSearch(query);
            } else {
                clearSearchBtn.classList.add('hidden');
                clearSearch();
            }
        });

        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearSearchBtn.classList.add('hidden');
            clearSearch();
        });

        function clearSearch() {
            searchGrid.innerHTML = '';
            searchCount.classList.add('hidden');
        }

        function runSearch(query) {
            const regex = new RegExp(query, 'i');
            const matches = state.moviesData.filter(m => 
                regex.test(m.title) || 
                (m.genres && m.genres.some(g => regex.test(g))) || 
                regex.test(m.year)
            );

            searchGrid.innerHTML = '';
            if (matches.length > 0) {
                searchCount.classList.remove('hidden');
                searchCount.innerText = `Matches (${matches.length})`;
                matches.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'space-y-1 active:scale-95 transition-transform cursor-pointer';
                    card.onclick = () => openDetails(item.id);
                    card.innerHTML = `
                        <div class="relative aspect-[2/3] bg-zinc-900 rounded-md overflow-hidden border border-zinc-800/20">
                            <img class="w-full h-full object-cover" src="${item.poster}" alt="${item.title}">
                            <div class="absolute top-1 left-1 bg-zinc-950/90 border border-zinc-800/30 text-[8px] font-extrabold text-brand-red px-1 rounded backdrop-blur-sm">
                                ★ ${item.rating}
                            </div>
                        </div>
                        <div class="px-0.5">
                            <p class="text-[10px] font-bold text-zinc-200 line-clamp-1 leading-normal">${item.title}</p>
                            <p class="text-[9px] text-zinc-500 font-bold mt-0.5">${item.year}</p>
                        </div>
                    `;
                    searchGrid.appendChild(card);
                });
            } else {
                searchCount.classList.remove('hidden');
                searchCount.innerText = `No results found`;
            }
        }

        function openDetails(id) {
            try {
                const item = state.moviesData.find(m => m.id === id);
                if (!item) throw new Error("Reference mismatch in loading modal");

                const modal = document.getElementById('detailsModal');
                const content = document.getElementById('detailsModalContent');
                const isSaved = state.watchlist.includes(item.id);

                let actionsAreaHtml = '';
                let tabBlockAreaHtml = '';

                if (item.type === 'movie') {
                    actionsAreaHtml = `
                        <div class="grid grid-cols-2 gap-2.5 px-4">
                            <a href="${item.download_url || '#'}" target="_blank" class="h-10 flex items-center justify-center gap-1.5 bg-brand-red hover:bg-brand-redHover rounded-lg text-xs font-extrabold text-white shadow-brand-glow active:scale-95 transition-transform">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                Download
                            </a>
                            <button onclick="shareLink('${item.id}')" class="h-10 flex items-center justify-center gap-1.5 bg-zinc-900 border border-zinc-800/50 rounded-lg text-xs font-extrabold text-zinc-200 active:scale-95 transition-transform">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M8.684 10.742l4.632-2.316m0 0a3 3 0 100-4.342m-4.632 6.658a3 3 0 110-4.342m4.632 6.658l-4.632 2.316m0 0a3 3 0 100 4.342"></path></svg>
                                Share
                            </button>
                        </div>
                    `;

                    tabBlockAreaHtml = `
                        <div class="px-4 space-y-2">
                            <h3 class="text-[9px] font-extrabold text-zinc-500 uppercase tracking-widest">Overview</h3>
                            <p class="text-xs leading-relaxed text-zinc-300 font-medium">${item.description}</p>
                        </div>
                    `;
                } else if (item.type === 'series') {
                    actionsAreaHtml = ``;

                    tabBlockAreaHtml = `
                        <div class="px-4">
                            <div class="flex border-b border-zinc-900/40 mb-3.5 gap-4">
                                <button onclick="switchDetailsTab('seasons')" id="detailTab-seasons" class="pb-2 text-xs font-extrabold text-white border-b-2 border-brand-red">Seasons</button>
                                <button onclick="switchDetailsTab('overview')" id="detailTab-overview" class="pb-2 text-xs font-extrabold text-zinc-400">Overview</button>
                            </div>

                            <div id="detailPanel-seasons" class="space-y-3.5">
                                <div class="flex gap-1.5 overflow-x-auto no-scrollbar" id="seasonsListContainer">
                                    ${(item.seasons || []).map((s, idx) => `
                                        <button onclick="selectSeason(${idx})" class="season-pill flex-none px-3.5 py-1.5 text-[10px] font-extrabold rounded bg-zinc-900/60 text-zinc-400 border border-zinc-850 active:scale-95 transition-all ${idx === 0 ? 'bg-zinc-100 text-zinc-950 border-white' : ''}" data-index="${idx}">
                                            S${s.season_number}
                                        </button>
                                    `).join('')}
                                </div>
                                
                                <div class="space-y-2.5" id="episodesListContainer">
                                    ${buildEpisodesList(item, 0)}
                                </div>
                            </div>

                            <div id="detailPanel-overview" class="hidden">
                                <p class="text-xs leading-relaxed text-zinc-300 font-medium">${item.description}</p>
                            </div>
                        </div>
                    `;
                }

                content.innerHTML = `
                    <div class="relative w-full aspect-[16/10] bg-zinc-950/40">
                        <div class="absolute inset-0">
                            <!-- Premium blur wash effect with heavy blur-3xl and high wash opacity -->
                            <img class="w-full h-full object-cover blur-3xl opacity-45 scale-110" src="${item.backdrop || item.poster}" alt="backdrop blur">
                            <div class="absolute inset-0 bg-gradient-to-t from-zinc-950/70 to-zinc-950/10"></div>
                        </div>
                        
                        <div class="absolute inset-x-0 bottom-0 flex flex-col items-center justify-end pb-2">
                            <div class="w-24 aspect-[2/3] rounded-lg overflow-hidden border border-zinc-800/40 shadow-2xl relative z-10 bg-zinc-900">
                                <img class="w-full h-full object-cover" src="${item.poster}" alt="Poster">
                            </div>
                        </div>
                    </div>

                    <div class="text-center px-4 py-2 space-y-1.5 relative z-10">
                        <h1 class="text-lg font-black text-white leading-tight tracking-wide">${item.title}</h1>
                        <div class="flex items-center justify-center gap-1.5 flex-wrap text-[10px] font-bold text-zinc-400">
                            <span>${item.year}</span>
                            <span class="w-1 h-1 rounded-full bg-zinc-750"></span>
                            <span class="text-brand-red">★ ${item.rating}</span>
                            <span class="w-1 h-1 rounded-full bg-zinc-750"></span>
                            <span>${item.runtime}</span>
                            ${item.status ? `
                                <span class="w-1 h-1 rounded-full bg-zinc-750"></span>
                                <span class="bg-zinc-900/90 border border-zinc-800/50 text-[8px] uppercase font-bold text-brand-red px-1.5 py-0.5 rounded">${item.status}</span>
                            ` : ''}
                        </div>
                        
                        <div class="flex items-center justify-center gap-1 flex-wrap pt-0.5">
                            ${(item.genres || []).map(g => `
                                <span class="text-[9px] font-extrabold tracking-wide bg-zinc-900/60 border border-zinc-800/30 px-2 py-0.5 rounded text-zinc-400">${g}</span>
                            `).join('')}

                    <div class="space-y-4 pt-2">
                        ${actionsAreaHtml}
                        ${tabBlockAreaHtml}

                    <div class="mt-6 border-t border-zinc-900/30 pt-4 px-4 flex gap-2.5">

                            ← Back
                        </button>
                        <button id="modalWatchlistBtn" onclick="toggleWatchlistDetails('${item.id}')" class="flex-1 h-10 border rounded-lg text-xs font-extrabold active:scale-95 transition-transform flex items-center justify-center gap-1.5 ${isSaved ? 'bg-zinc-900 border-zinc-800 text-brand-red' : 'bg-zinc-100 text-zinc-950 border-zinc-100'}">
                            <svg class="w-3.5 h-3.5 ${isSaved ? 'fill-brand-red stroke-brand-red' : 'stroke-zinc-950 fill-none'}" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
                            ${isSaved ? 'In Watchlist' : 'Add to List'}
                        </button>
                    </div>
                `;

                state.activeModalItemId = item.id;
                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } catch (err) {
                showToast("Failed to load details");
            }
        }

        function switchDetailsTab(panel) {
            const tabs = ['seasons', 'overview'];
            tabs.forEach(t => {
                const button = document.getElementById(`detailTab-${t}`);
                const view = document.getElementById(`detailPanel-${t}`);
                if (t === panel) {
                    button.className = "pb-2 text-xs font-extrabold text-white border-b-2 border-brand-red";
                    view.classList.remove('hidden');
                } else {
                    button.className = "pb-2 text-xs font-extrabold text-zinc-400";
                    view.classList.add('hidden');
                }
            });
        }

        function selectSeason(index) {
            const item = state.moviesData.find(m => m.id === state.activeModalItemId);
            if (!item) return;

            document.querySelectorAll('.season-pill').forEach((pill, idx) => {
                if (idx === index) {
                    pill.className = 'season-pill flex-none px-3.5 py-1.5 text-[10px] font-extrabold rounded bg-zinc-100 text-zinc-950 border border-white';
                } else {
                    pill.className = 'season-pill flex-none px-3.5 py-1.5 text-[10px] font-extrabold rounded bg-zinc-900/60 text-zinc-400 border border-zinc-800/80';
                }
            });

            const container = document.getElementById('episodesListContainer');
            container.innerHTML = buildEpisodesList(item, index);
        }

        function buildEpisodesList(item, seasonIndex) {
            const season = item.seasons && item.seasons[seasonIndex];
            if (!season || !season.episodes || season.episodes.length === 0) {
                return `<div class="text-center py-6 text-xs text-zinc-500">No episodes found.</div>`;
            }

            return season.episodes.map(ep => `
                <div class="glass-panel rounded-lg p-2.5 flex items-center justify-between gap-2.5 border-zinc-800/10">
                    <div class="flex items-center gap-2.5">
                        <div class="w-14 aspect-[16/10] bg-zinc-800 rounded overflow-hidden relative flex-shrink-0">
                            <img class="w-full h-full object-cover" src="${ep.thumbnail || item.poster}" alt="ep thumb">
                            <div class="absolute bottom-0.5 right-0.5 bg-zinc-950/80 px-1 py-0.5 rounded text-[7px] font-extrabold text-white">E${ep.episode_number}</div>
                        </div>
                        <div>
                            <h4 class="text-[11px] font-extrabold text-zinc-200 line-clamp-1 leading-normal">${ep.title}</h4>
                            <p class="text-[9px] text-zinc-500 font-bold mt-0.5">${ep.duration}</p>
                        </div>
                    </div>
                    <a href="${ep.download_url || '#'}" target="_blank" class="h-7 px-3 rounded-md bg-brand-red hover:bg-brand-redHover flex items-center justify-center gap-1 text-[10px] font-extrabold text-white active:scale-95 transition-transform shrink-0">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Download
                    </a>
                </div>
            `).join('');
        }

        function toggleWatchlistDetails(id) {
            toggleWatchlist(id);
            const isSaved = state.watchlist.includes(id);
            const btn = document.getElementById('modalWatchlistBtn');
            if (isSaved) {
                btn.className = 'flex-1 h-10 bg-zinc-900 border border-zinc-800 rounded-lg text-xs font-extrabold text-brand-red active:scale-95 transition-transform flex items-center justify-center gap-1.5';
                btn.innerHTML = `<svg class="w-3.5 h-3.5 fill-brand-red stroke-brand-red" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>In Watchlist`;
            } else {
                btn.className = 'flex-1 h-10 bg-zinc-100 text-zinc-950 border border-zinc-100 rounded-lg text-xs font-extrabold active:scale-95 transition-transform flex items-center justify-center gap-1.5';
                btn.innerHTML = `<svg class="w-3.5 h-3.5 stroke-zinc-950 fill-none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>Add to List`;
            }
        }

        function closeDetails() {
            document.getElementById('detailsModal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function shareLink(id) {
            const baseUrl = window.location.origin + window.location.pathname;
            const shareUrl = `${baseUrl}?startapp=${id}`;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(shareUrl)
                    .then(() => showToast("LINK COPIED"))
                    .catch(() => showToast("FAILED"));
            } else {
                const temp = document.createElement('input');
                temp.value = shareUrl;
                document.body.appendChild(temp);
                temp.select();
                try {
                    document.execCommand('copy');
                    showToast("LINK COPIED");
                } catch (e) {
                    showToast("FAILED");
                }
                document.body.removeChild(temp);
            }
        }

        document.getElementById('profileBtn').addEventListener('click', () => {
            renderProfileInfo();
            document.getElementById('profileModal').classList.remove('hidden');
        });

        document.getElementById('closeProfileBtn').addEventListener('click', () => {
            document.getElementById('profileModal').classList.add('hidden');
        });

        window.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                closeDetails();
                document.getElementById('profileModal').classList.add('hidden');
            }
        });

        function checkStartupParameters() {
            if (tgInstance && tgInstance.initDataUnsafe && tgInstance.initDataUnsafe.start_param) {
                const param = tgInstance.initDataUnsafe.start_param;
                if (param) openDetails(param);
            } else {
                const urlParams = new URLSearchParams(window.location.search);
                const startApp = urlParams.get('startapp');
                if (startApp) openDetails(startApp);
            }
        }

        (async function initApp() {
            loadWatchlist();
            await fetchMoviesData();
            renderProfileInfo();
            renderHeroSlider();
            renderHomeCategories();
            checkStartupParameters();
        })();
    </script>
</body>
 </html>
