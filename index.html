 <!DOCTYPE html>
<html lang="en" class="h-full select-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLHBM</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            red: '#E50914',
                            redHover: '#B20710'
                        }
                    }
                }
            }
        }
    </script>
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #09090b; /* bg-zinc-950 */
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        /* Custom Scrollbar Hiding */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Glassmorphic Utilities */
        .glass-panel {
            background: rgba(24, 24, 27, 0.8); /* zinc-900/80 */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(63, 63, 70, 0.4); /* zinc-800/40 */
        }
    </style>
</head>
<body class="h-full text-zinc-100 flex flex-col justify-between">

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-40 bg-zinc-950/80 backdrop-blur-md border-b border-zinc-900 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <span class="text-brand-red font-black tracking-wider text-xl">[MLHBM]</span>
        </div>
        <button id="profileBtn" class="w-8 h-8 rounded-full overflow-hidden border border-zinc-800 focus:outline-none transition-transform active:scale-95">
            <!-- Fallback Icon / Initials will display here dynamically -->
            <div id="profileAvatarFallback" class="w-full h-full bg-zinc-800 flex items-center justify-center text-xs font-bold text-zinc-300">
                U
            </div>
            <img id="profileAvatarImg" class="w-full h-full object-cover hidden" alt="Avatar">
        </button>
    </header>

    <!-- Main Content Containers -->
    <main class="flex-1 overflow-y-auto pt-[61px] pb-[76px]">
        
        <!-- View: Home -->
        <div id="view-home" class="view-panel space-y-6">
            <!-- Hero Slider -->
            <div class="relative w-full aspect-[16/10] sm:aspect-[16/9] bg-zinc-900 overflow-hidden" id="heroSliderContainer">
                <div id="heroWrapper" class="w-full h-full flex transition-transform duration-500 ease-out">
                    <!-- Slides loaded dynamically -->
                </div>
                <!-- Gradient overlays -->
                <div class="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/20 to-transparent pointer-events-none"></div>
                <div class="absolute inset-x-0 bottom-0 p-4 pt-12 bg-gradient-to-t from-zinc-950 to-transparent flex flex-col justify-end">
                    <div id="sliderMeta" class="space-y-1">
                        <!-- Dynamic metadata populated on slide change -->
                    </div>
                </div>
                <!-- Navigation dots -->
                <div class="absolute bottom-4 right-4 flex gap-1.5 z-10" id="sliderDots">
                    <!-- Dots loaded dynamically -->
                </div>
            </div>

            <!-- Category Rows Dynamic Container -->
            <div id="homeCategories" class="px-4 space-y-6 pb-6">
                <!-- Rows loaded dynamically -->
            </div>
        </div>

        <!-- View: Search -->
        <div id="view-search" class="view-panel hidden px-4 py-4 space-y-4">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Search movies, series, genres..." 
                    class="w-full h-11 bg-zinc-900/90 border border-zinc-800 rounded-lg px-4 pl-10 text-sm text-zinc-200 focus:outline-none focus:border-brand-red transition-all">
                <span class="absolute left-3.5 top-3.5 text-zinc-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <button id="clearSearchBtn" class="absolute right-3.5 top-3.5 text-zinc-500 hidden">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <!-- Search Results -->
            <div id="searchResultsCount" class="text-xs text-zinc-500 hidden"></div>
            <div id="searchResultsGrid" class="grid grid-cols-3 gap-2">
                <!-- Results rendered here -->
            </div>
        </div>

        <!-- View: Browse -->
        <div id="view-browse" class="view-panel hidden px-4 py-4 space-y-6">
            <!-- Browse Switch -->
            <div class="flex bg-zinc-900 p-1 rounded-lg border border-zinc-800">
                <button id="browseTypeMovie" class="flex-1 py-1.5 text-sm font-semibold rounded-md transition-all bg-brand-red text-white shadow-lg">Movies</button>
                <button id="browseTypeSeries" class="flex-1 py-1.5 text-sm font-semibold text-zinc-400 rounded-md transition-all">TV Shows</button>
            </div>

            <!-- Browse Genre Grid Collage -->
            <div class="space-y-3">
                <h3 class="text-sm font-bold text-zinc-400 tracking-wider uppercase">Browse by Genre</h3>
                <div id="genreGrid" class="grid grid-cols-2 gap-3">
                    <!-- Genre cards with collage look -->
                </div>
            </div>
        </div>

        <!-- View: Watchlist -->
        <div id="view-watchlist" class="view-panel hidden px-4 py-4 space-y-4">
            <h2 class="text-lg font-bold">My Watchlist</h2>
            <div id="watchlistGrid" class="grid grid-cols-3 gap-2">
                <!-- Saved items render here -->
            </div>
            <div id="watchlistEmptyState" class="hidden flex flex-col items-center justify-center py-20 text-center space-y-3">
                <div class="text-zinc-700">
                    <svg class="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
                </div>
                <p class="text-sm text-zinc-500">Your watchlist is currently empty</p>
            </div>
        </div>

    </main>

    <!-- Bottom Navigation Bar (Exactly 4 Tabs - No Music / More) -->
    <nav class="fixed bottom-0 left-0 right-0 z-40 bg-zinc-900/90 backdrop-blur-md border-t border-zinc-800/60 px-2 py-2 flex items-center justify-around">
        <button data-target="home" class="nav-tab flex flex-col items-center gap-1 py-1 text-brand-red">
            <svg class="w-5.5 h-5.5" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[10px] font-medium tracking-wide">Home</span>
        </button>

            <span class="text-[10px] font-medium tracking-wide">Search</span>
        </button>
        <button data-target="browse" class="nav-tab flex flex-col items-center gap-1 py-1 text-zinc-500 hover:text-zinc-300">
            <svg class="w-5.5 h-5.5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h7"/></svg>
            <span class="text-[10px] font-medium tracking-wide">Browse</span>
        </button>

            <svg class="w-5.5 h-5.5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>

        <div id="detailsModalContent" class="min-h-full pb-10">

                </div>
                <div>
                    <h4 id="profileModalName" class="font-bold text-lg text-white">Guest User</h4>
                    <p id="profileModalUsername" class="text-sm text-zinc-500">@guest</p>
                </div>
            </div>
            <div class="space-y-2 border-t border-zinc-800 pt-4 text-sm text-zinc-400">

                </div>
                <div class="flex justify-between">

        // Security protections: Prevent copy, right-click, selection, dev tools shortcuts
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && e.key === 'I') || 
                (e.ctrlKey && e.shiftKey && e.key === 'C') || 
                (e.ctrlKey && e.shiftKey && e.key === 'J') || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
            }
        });
        document.addEventListener('gesturestart', e => e.preventDefault()); // iOS double-tap/pinch block

        // Global state storage
        const state = {
            tgUser: null,
            userId: 'guest',
            watchlist: [],
            moviesData: [],
            activeSlide: 0,
            slideTimer: null,
            touchStartX: 0,
            touchEndX: 0,
            activeBrowseType: 'movie' // 'movie' or 'series'
        };

        // Initialize Telegram interface variables safely
        let tgInstance = null;
        if (window.Telegram && window.Telegram.WebApp) {
            tgInstance = window.Telegram.WebApp;
            tgInstance.ready();
            tgInstance.expand();
            if (tgInstance.initDataUnsafe && tgInstance.initDataUnsafe.user) {
                state.tgUser = tgInstance.initDataUnsafe.user;
                state.userId = state.tgUser.id.toString();
            }
        }

        // Load local storage saved watchlist matching key index
        function loadWatchlist() {
            try {
                const stored = localStorage.getItem(`watchlist_${state.userId}`);
                state.watchlist = stored ? JSON.parse(stored) : [];
            } catch (e) {
                console.warn("Storage read failure:", e);
                state.watchlist = [];
            }
        }

        function saveWatchlist() {
            try {
                localStorage.setItem(`watchlist_${state.userId}`, JSON.stringify(state.watchlist));
            } catch (e) {

        // Fetch movies database
        async function fetchMoviesData() {
            try {
                const response = await fetch('movies.json');
                if (response.ok) {
                    state.moviesData = await response.json();
                } else {
                    state.moviesData = mockFallbackData;
                }
            } catch (err) {
                console.warn("Loading fallback dataset due to:", err);
                state.moviesData = mockFallbackData;
            }
        }

        // Display user account details if verified
        function renderProfileInfo() {
            if (state.tgUser) {
                // Render small top-right avatar
                if (state.tgUser.photo_url) {
                    document.getElementById('profileAvatarImg').src = state.tgUser.photo_url;
                    document.getElementById('profileAvatarImg').classList.remove('hidden');
                    document.getElementById('profileAvatarFallback').classList.add('hidden');
                    
                    document.getElementById('profileModalAvatarImg').src = state.tgUser.photo_url;
                    document.getElementById('profileModalAvatarImg').classList.remove('hidden');
                    document.getElementById('profileModalInitials').classList.add('hidden');
                } else {
                    const initials = (state.tgUser.first_name || 'U')[0].toUpperCase();
                    document.getElementById('profileAvatarFallback').innerText = initials;
                    document.getElementById('profileModalInitials').innerText = initials;
                }
                
                // Set name, username, ID in modal
                const displayName = [state.tgUser.first_name, state.tgUser.last_name].filter(Boolean).join(' ');
                document.getElementById('profileModalName').innerText = displayName || 'User';
                document.getElementById('profileModalUsername').innerText = state.tgUser.username ? `@${state.tgUser.username}` : '';
                document.getElementById('profileModalId').innerText = state.tgUser.id;
            } else {
                // Ensure correct fallbacks are applied for general browsers
                document.getElementById('profileAvatarFallback').innerText = 'G';
                document.getElementById('profileModalInitials').innerText = 'G';
            }
            document.getElementById('profileModalWatchlistCount').innerText = state.watchlist.length;
        }

        // Render the Hero Slider structure
        function renderHeroSlider() {
            // Take up to 5 items that contain a backdrop for the slider
            const sliderItems = state.moviesData.filter(m => m.backdrop).slice(0, 5);
            const wrapper = document.getElementById('heroWrapper');
            const dotsContainer = document.getElementById('sliderDots');
            
            wrapper.innerHTML = '';
            dotsContainer.innerHTML = '';
            
            if (sliderItems.length === 0) {
                document.getElementById('heroSliderContainer').classList.add('hidden');
                return;
            } else {
                document.getElementById('heroSliderContainer').classList.remove('hidden');
            }

            sliderItems.forEach((item, index) => {
                // Slide markup
                const slide = document.createElement('div');
                slide.className = 'w-full h-full flex-shrink-0 relative';
                slide.style.width = '100vw';
                slide.innerHTML = `
                    <img class="w-full h-full object-cover" src="${item.backdrop}" alt="${item.title}">
                `;
                wrapper.appendChild(slide);

                // Nav dot dot
                const dot = document.createElement('button');
                dot.className = `w-1.5 h-1.5 rounded-full transition-all duration-300 ${index === 0 ? 'bg-brand-red w-3.5' : 'bg-zinc-600'}`;
                dot.setAttribute('data-index', index);
                dotsContainer.appendChild(dot);
            });

            // Dot event binding
            dotsContainer.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    clearInterval(state.slideTimer);
                    goToSlide(parseInt(btn.getAttribute('data-index')));
                });
            });

            state.activeSlide = 0;
            updateSliderMeta(sliderItems[0]);
            startSliderAutoplay();
        }

        function goToSlide(index) {
            const sliderItems = state.moviesData.filter(m => m.backdrop).slice(0, 5);
            if (index < 0) index = sliderItems.length - 1;
            if (index >= sliderItems.length) index = 0;
            
            state.activeSlide = index;
            const wrapper = document.getElementById('heroWrapper');
            wrapper.style.transform = `translateX(-${index * 100}vw)`;
            
            // Adjust active indicator dots
            const dots = document.getElementById('sliderDots').querySelectorAll('button');
            dots.forEach((dot, idx) => {
                if (idx === index) {
                    dot.className = 'w-1.5 h-1.5 rounded-full transition-all duration-300 bg-brand-red w-3.5';
                } else {

                    </button>
                </div>

        function startSliderAutoplay() {
            clearInterval(state.slideTimer);
            state.slideTimer = setInterval(() => {
                goToSlide(state.activeSlide + 1);
            }, 6000);
        }

        // Bind Drag and Swipe Event Listeners to Hero Slider
        const sliderContainer = document.getElementById('heroSliderContainer');
        sliderContainer.addEventListener('touchstart', e => {
            state.touchStartX = e.changedTouches[0].screenX;
            clearInterval(state.slideTimer); // Stop autoplay during swipe interaction
        });
        
        sliderContainer.addEventListener('touchend', e => {
            state.touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
            startSliderAutoplay(); // Resume standard autoplay
        });

        function handleSwipe() {
            const swipeThreshold = 50;
            const diffX = state.touchStartX - state.touchEndX;
            if (Math.abs(diffX) > swipeThreshold) {
                if (diffX > 0) {
                    goToSlide(state.activeSlide + 1); // Swipe left, load next slide
                } else {
                    goToSlide(state.activeSlide - 1); // Swipe right, load previous slide
                }
            }
        }

        // Render Dynamic Categories Rows on Home
        function renderHomeCategories() {
            const container = document.getElementById('homeCategories');
            container.innerHTML = '';

            // Extract unique categories (except 'None')
            const categories = [...new Set(state.moviesData.map(m => m.category))]
                .filter(c => c && c.toLowerCase() !== 'none');

            categories.forEach(cat => {
                const items = state.moviesData.filter(m => m.category === cat);
                if (items.length === 0) return;

                const row = document.createElement('div');
                row.className = 'space-y-3';
                row.innerHTML = `
                    <div class="flex items-center justify-between">

                    </div>
                    <div class="flex gap-3 overflow-x-auto no-scrollbar py-1">

                                <div class="relative aspect-[2/3] bg-zinc-900 rounded-lg overflow-hidden border border-zinc-800/40">
                                    <img class="w-full h-full object-cover lazy-poster" src="${item.poster}" alt="${item.title}">
                                    <div class="absolute top-1.5 left-1.5 bg-zinc-950/80 border border-zinc-800/40 text-[9px] font-bold text-brand-red px-1.5 py-0.5 rounded-full backdrop-blur-sm flex items-center gap-0.5 shadow-lg">

        // Navigation Switching Engine
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.getAttribute('data-target');
                
                // Swap CSS highlighted state
                document.querySelectorAll('.nav-tab').forEach(t => {
                    t.classList.remove('text-brand-red');
                    t.classList.add('text-zinc-500', 'hover:text-zinc-300');
                });
                tab.classList.remove('text-zinc-500', 'hover:text-zinc-300');
                tab.classList.add('text-brand-red');

                // Toggle visibility structures
                document.querySelectorAll('.view-panel').forEach(view => {
                    view.classList.add('hidden');
                });
                document.getElementById(`view-${target}`).classList.remove('hidden');

                if (target === 'watchlist') {
                    renderWatchlist();
                } else if (target === 'browse') {
                    renderGenreGrid();
                }
            });
        });

        // Watchlist view generator
        function renderWatchlist() {
            const grid = document.getElementById('watchlistGrid');
            const emptyState = document.getElementById('watchlistEmptyState');
            grid.innerHTML = '';

            const list = state.moviesData.filter(m => state.watchlist.includes(m.id));

            if (list.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                grid.classList.remove('hidden');

                list.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'space-y-1.5 active:scale-95 transition-transform cursor-pointer';
                    card.onclick = () => openDetails(item.id);
                    card.innerHTML = `
                        <div class="relative aspect-[2/3] bg-zinc-900 rounded-lg overflow-hidden border border-zinc-800/40">
                            <img class="w-full h-full object-cover" src="${item.poster}" alt="${item.title}">
                            <div class="absolute top-1.5 left-1.5 bg-zinc-950/80 border border-zinc-800/40 text-[9px] font-bold text-brand-red px-1.5 py-0.5 rounded-full backdrop-blur-sm shadow-lg">
                                ★ ${item.rating}
                            </div>
                        </div>
                        <div class="px-0.5">
                            <p class="text-xs font-bold text-zinc-200 line-clamp-1">${item.title}</p>

                    grid.appendChild(card);

        // Generic Toast Alert Notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = message;
            toast.className = toast.className.replace('opacity-0 pointer-events-none', 'opacity-100 scale-100');
            
            setTimeout(() => {
                toast.className = toast.className.replace('opacity-100 scale-100', 'opacity-0 pointer-events-none');
            }, 3000);
        }

        // Toggle bookmarks matching storage state
        function toggleWatchlist(id, event) {
            if (event) event.stopPropagation();
            const index = state.watchlist.indexOf(id);
            if (index > -1) {
                state.watchlist.splice(index, 1);
                showToast("Removed from Watchlist");
            } else {
                state.watchlist.push(id);
                showToast("Added to Watchlist");
            }
            saveWatchlist();
            
            // Refresh visual display
            const activeSlideData = state.moviesData.filter(m => m.backdrop).slice(0, 5)[state.activeSlide];
            if (activeSlideData && activeSlideData.id === id) {
                updateSliderMeta(activeSlideData);
            }
            renderProfileInfo();
        }

        // Browse collage logic
        document.getElementById('browseTypeMovie').addEventListener('click', () => {
            state.activeBrowseType = 'movie';
            document.getElementById('browseTypeMovie').className = 'flex-1 py-1.5 text-sm font-semibold rounded-md transition-all bg-brand-red text-white shadow-lg';
            document.getElementById('browseTypeSeries').className = 'flex-1 py-1.5 text-sm font-semibold text-zinc-400 rounded-md transition-all';
            renderGenreGrid();
        });

        document.getElementById('browseTypeSeries').addEventListener('click', () => {
            state.activeBrowseType = 'series';
            document.getElementById('browseTypeSeries').className = 'flex-1 py-1.5 text-sm font-semibold rounded-md transition-all bg-brand-red text-white shadow-lg';
            document.getElementById('browseTypeMovie').className = 'flex-1 py-1.5 text-sm font-semibold text-zinc-400 rounded-md transition-all';
            renderGenreGrid();
        });

        function renderGenreGrid() {
            const grid = document.getElementById('genreGrid');
            grid.innerHTML = '';

            // Filter movies by active type
            const filteredItems = state.moviesData.filter(m => m.type === state.activeBrowseType);
            
            // Extract unique genres
            const genres = [...new Set(filteredItems.flatMap(m => m.genres || []))];

            if (genres.length === 0) {
                grid.innerHTML = `<div class="col-span-2 text-center py-10 text-xs text-zinc-500">No items available.</div>`;
                return;
            }

            genres.forEach(genre => {
                const matches = filteredItems.filter(m => m.genres.includes(genre));
                // Collage backgrounds composed of up to 4 poster slivers/images
                const images = matches.slice(0, 4).map(m => m.poster);
                
                const card = document.createElement('div');
                card.className = 'relative aspect-[16/11] bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800/60 flex active:scale-98 transition-transform cursor-pointer';
                card.onclick = () => openGenreBrowse(genre, state.activeBrowseType);

                // Build Collage Grid split dynamically
                let imageBlocksHtml = '';
                if (images.length === 1) {
                    imageBlocksHtml = `<img class="w-full h-full object-cover opacity-35" src="${images[0]}" alt="genre bg">`;
                } else if (images.length === 2) {
                    imageBlocksHtml = `
                        <div class="w-1/2 h-full"><img class="w-full h-full object-cover opacity-35" src="${images[0]}"></div>
                        <div class="w-1/2 h-full"><img class="w-full h-full object-cover opacity-35" src="${images[1]}"></div>
                    `;
                } else {
                    imageBlocksHtml = `
                        <div class="w-1/2 h-full flex flex-col">
                            <img class="h-1/2 w-full object-cover opacity-35" src="${images[0]}">
                            <img class="h-1/2 w-full object-cover opacity-35" src="${images[1] || images[0]}">
                        </div>
                        <div class="w-1/2 h-full flex flex-col">
                            <img class="h-1/2 w-full object-cover opacity-35" src="${images[2] || images[0]}">
                            <img class="h-1/2 w-full object-cover opacity-35" src="${images[3] || images[0]}">
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="absolute inset-0 flex">${imageBlocksHtml}</div>
                    <div class="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/70 to-zinc-950/30 flex flex-col justify-end p-3.5">
                        <span class="text-sm font-extrabold text-white leading-tight tracking-wide">${genre}</span>
                        <span class="text-[10px] text-zinc-400 font-semibold mt-0.5">Explore →</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Open Genre exploration modal or swap search target
        function openGenreBrowse(genre, type) {
            const tabSearch = document.querySelector('.nav-tab[data-target="search"]');
            tabSearch.click();
            document.getElementById('searchInput').value = genre;
            runSearch(genre);
        }

        // Search engine logic
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const searchGrid = document.getElementById('searchResultsGrid');
        const searchCount = document.getElementById('searchResultsCount');

        searchInput.addEventListener('input', () => {
            const query = searchInput.value.trim();
            if (query) {
                clearSearchBtn.classList.remove('hidden');
                runSearch(query);
            } else {
                clearSearchBtn.classList.add('hidden');
                clearSearch();
            }
        });

        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearSearchBtn.classList.add('hidden');
            clearSearch();
        });

        function clearSearch() {
            searchGrid.innerHTML = '';
            searchCount.classList.add('hidden');
        }

        function runSearch(query) {
            const regex = new RegExp(query, 'i');
            const matches = state.moviesData.filter(m => 
                regex.test(m.title) || 
                (m.genres && m.genres.some(g => regex.test(g))) || 
                regex.test(m.year)
            );

            searchGrid.innerHTML = '';
            if (matches.length > 0) {
                searchCount.classList.remove('hidden');
                searchCount.innerText = `Found ${matches.length} matches`;
                matches.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'space-y-1.5 active:scale-95 transition-transform cursor-pointer';
                    card.onclick = () => openDetails(item.id);
                    card.innerHTML = `
                        <div class="relative aspect-[2/3] bg-zinc-900 rounded-lg overflow-hidden border border-zinc-800/40">
                            <img class="w-full h-full object-cover" src="${item.poster}" alt="${item.title}">
                            <div class="absolute top-1.5 left-1.5 bg-zinc-950/80 border border-zinc-800/40 text-[9px] font-bold text-brand-red px-1.5 py-0.5 rounded-full backdrop-blur-sm">
                                ★ ${item.rating}
                            </div>
                        </div>
                        <div class="px-0.5">
                            <p class="text-xs font-bold text-zinc-200 line-clamp-1">${item.title}</p>
                            <p class="text-[10px] text-zinc-500 font-semibold">${item.year}</p>
                        </div>
                    `;
                    searchGrid.appendChild(card);
                });
            } else {
                searchCount.classList.remove('hidden');
                searchCount.innerText = `No results found for "${query}"`;
            }
        }

        // Details view engine loaded inside single overlays securely (defensive style checks)
        function openDetails(id) {

                if (!item) throw new Error("Item mapping mismatch on loading details window");

                const modal = document.getElementById('detailsModal');

                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                Download
                            </a>

                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M8.684 10.742l4.632-2.316m0 0a3 3 0 100-4.342m-4.632 6.658a3 3 0 110-4.342m4.632 6.658l-4.632 2.316m0 0a3 3 0 100 4.342"></path></svg>

                                        <button onclick="selectSeason(${idx})" class="season-pill flex-none px-4 py-2 text-xs font-extrabold rounded-lg border ${idx === 0 ? 'bg-zinc-100 text-zinc-950 border-white' : 'bg-zinc-900 text-zinc-400 border-zinc-800'}" data-index="${idx}">
                                            S${s.season_number}
                                        </button>
                                    `).join('')}
                                </div>
                                
                                <div class="space-y-3" id="episodesListContainer">
                                    <!-- Dynamic Episode Cards inside first season by default -->
                                    ${buildEpisodesList(item, 0)}
                                </div>
                            </div>

                            <!-- Overview Tab content Panel -->
                            <div id="detailPanel-overview" class="hidden">
                                <p class="text-sm leading-relaxed text-zinc-300 font-medium">${item.description}</p>
                            </div>
                        </div>
                    `;
                }

                content.innerHTML = `
                    <!-- Top banner section -->
                    <div class="relative w-full aspect-[16/10] bg-zinc-950">

                        <div class="absolute inset-x-0 bottom-0 flex flex-col items-center justify-end pb-4">
                            <div class="w-28 aspect-[2/3] rounded-xl overflow-hidden border border-zinc-800 shadow-2xl relative z-10 bg-zinc-900">
                                <img class="w-full h-full object-cover" src="${item.poster}" alt="Poster sharp">
                            </div>
                        </div>
                    </div>

                    <!-- Meta information -->
                    <div class="text-center px-4 py-3 space-y-2 relative z-10">
                        <h1 class="text-2xl font-black text-white leading-tight tracking-wide">${item.title}</h1>
                        <div class="flex items-center justify-center gap-2 flex-wrap text-xs font-semibold text-zinc-400">
                            <span>${item.year}</span>
                            <span class="w-1 h-1 rounded-full bg-zinc-700"></span>
                            <span class="text-brand-red">★ ${item.rating}</span>

                            ${item.status ? `
                                <span class="w-1 h-1 rounded-full bg-zinc-700"></span>
                                <span class="bg-zinc-900 border border-zinc-800 text-[10px] uppercase font-bold text-brand-red px-2 py-0.5 rounded-full">${item.status}</span>

                    <!-- Actions and tabs dynamic blocks area -->

                        ${actionsAreaHtml}

                        </button>
                        <button id="modalWatchlistBtn" onclick="toggleWatchlistDetails('${item.id}')" class="flex-1 h-11 border rounded-xl text-xs font-bold active:scale-95 transition-transform flex items-center justify-center gap-2 ${isSaved ? 'bg-zinc-900 border-zinc-800 text-brand-red' : 'bg-zinc-100 text-zinc-950 border-zinc-100'}">

                            ${isSaved ? 'In Watchlist' : 'Add to List'}
                        </button>

                `;

                // Cache active modal item inside temporary memory
                state.activeModalItemId = item.id;
                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden'; // Stop background scrolling
            } catch (err) {
                console.error("Defensive details rendering halt:", err);
                showToast("Failed to load details");
            }
        }

        // Sub-tabs switches inside Details Modal
        function switchDetailsTab(panel) {
            const tabs = ['seasons', 'overview'];
            tabs.forEach(t => {
                const button = document.getElementById(`detailTab-${t}`);
                const view = document.getElementById(`detailPanel-${t}`);
                if (t === panel) {
                    button.className = "pb-3 text-sm font-bold text-white border-b-2 border-brand-red";
                    view.classList.remove('hidden');
                } else {
                    button.className = "pb-3 text-sm font-bold text-zinc-400";
                    view.classList.add('hidden');
                }
            });
        }

        // Select specific Season tab dynamically
        function selectSeason(index) {
            const item = state.moviesData.find(m => m.id === state.activeModalItemId);
            if (!item) return;

            // Swap styling for season pills
            document.querySelectorAll('.season-pill').forEach((pill, idx) => {
                if (idx === index) {
                    pill.className = 'season-pill flex-none px-4 py-2 text-xs font-extrabold rounded-lg bg-zinc-100 text-zinc-950 border border-white';
                } else {
                    pill.className = 'season-pill flex-none px-4 py-2 text-xs font-extrabold rounded-lg bg-zinc-900 text-zinc-400 border border-zinc-800';
                }
            });

            // Rebuild episodes layout
            const container = document.getElementById('episodesListContainer');
            container.innerHTML = buildEpisodesList(item, index);
        }

        function buildEpisodesList(item, seasonIndex) {
            const season = item.seasons && item.seasons[seasonIndex];
            if (!season || !season.episodes || season.episodes.length === 0) {
                return `<div class="text-center py-6 text-xs text-zinc-500">No episodes found.</div>`;
            }

            return season.episodes.map(ep => `
                <div class="glass-panel rounded-xl p-3 flex items-center justify-between gap-3 border-zinc-800/40">
                    <div class="flex items-center gap-3">
                        <div class="w-16 aspect-[16/10] bg-zinc-800 rounded-lg overflow-hidden relative flex-shrink-0">
                            <img class="w-full h-full object-cover" src="${ep.thumbnail || item.poster}" alt="ep thumb">
                            <div class="absolute bottom-1 right-1 bg-zinc-950/80 px-1 py-0.5 rounded text-[8px] font-extrabold text-white">E${ep.episode_number}</div>
                        </div>
                        <div>
                            <h4 class="text-xs font-extrabold text-zinc-200 line-clamp-1">${ep.title}</h4>
                            <p class="text-[10px] text-zinc-500 font-semibold mt-0.5">${ep.duration}</p>
                        </div>
                    </div>
                    <!-- Right prominent single download action button -->
                    <a href="${ep.download_url || '#'}" target="_blank" class="h-8 px-3 rounded-lg bg-brand-red hover:bg-brand-redHover flex items-center justify-center gap-1.5 text-white text-[11px] font-extrabold active:scale-95 transition-transform shrink-0">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Download
                    </a>
                </div>
            `).join('');
        }

        function toggleWatchlistDetails(id) {
            toggleWatchlist(id);
            const isSaved = state.watchlist.includes(id);
            const btn = document.getElementById('modalWatchlistBtn');
            if (isSaved) {
                btn.className = 'flex-1 h-11 bg-zinc-900 border border-zinc-800 rounded-xl text-xs font-bold text-brand-red active:scale-95 transition-transform flex items-center justify-center gap-2';
                btn.innerHTML = `<svg class="w-4 h-4 fill-brand-red stroke-brand-red" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>In Watchlist`;
            } else {
                btn.className = 'flex-1 h-11 bg-zinc-100 text-zinc-950 border border-zinc-100 rounded-xl text-xs font-bold active:scale-95 transition-transform flex items-center justify-center gap-2';
                btn.innerHTML = `<svg class="w-4 h-4 stroke-zinc-950 fill-none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>Add to List`;
            }
        }

        function closeDetails() {
            document.getElementById('detailsModal').classList.add('hidden');
            document.body.style.overflow = ''; // Unlock background scrolling
        }

        function shareLink(id) {
            // Generates Telegram Mini App share link
            const baseUrl = window.location.origin + window.location.pathname;
            const shareUrl = `${baseUrl}?startapp=${id}`;
            
            // Modern copy mechanism
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(shareUrl)
                    .then(() => showToast("Link copied to clipboard"))
                    .catch(() => showToast("Sharing failed"));
            } else {
                // Secondary fallback input method
                const temp = document.createElement('input');
                temp.value = shareUrl;
                document.body.appendChild(temp);
                temp.select();
                try {
                    document.execCommand('copy');
                    showToast("Link copied to clipboard");
                } catch (e) {
                    showToast("Sharing failed");
                }
                document.body.removeChild(temp);
            }
        }

        // Profile dialog toggles
        document.getElementById('profileBtn').addEventListener('click', () => {
            renderProfileInfo();
            document.getElementById('profileModal').classList.remove('hidden');
        });

        document.getElementById('closeProfileBtn').addEventListener('click', () => {
            document.getElementById('profileModal').classList.add('hidden');
        });

        // Close details modal on hitting Escape key
        window.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                closeDetails();
                document.getElementById('profileModal').classList.add('hidden');
            }
        });

        // Check for startup direct link params (e.g. sharing launch)
        function checkStartupParameters() {
            if (tgInstance && tgInstance.initDataUnsafe && tgInstance.initDataUnsafe.start_param) {
                const param = tgInstance.initDataUnsafe.start_param;
                if (param) openDetails(param);
            } else {
                const urlParams = new URLSearchParams(window.location.search);
                const startApp = urlParams.get('startapp');
                if (startApp) openDetails(startApp);
            }
        }

        // Initialize Core App
        (async function initApp() {
            loadWatchlist();
            await fetchMoviesData();
            renderProfileInfo();
            renderHeroSlider();
            renderHomeCategories();
            checkStartupParameters();
        })();
    </script>
</body>
